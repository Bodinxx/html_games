<!-- 
CATEGORY: Games
DESCRIPTION: Grandmaster Checkers is a professional-grade digital tabletop experience featuring stylized typography, a responsive 8x8 game board, and an advanced AI opponent powered by a minimax algorithm with three difficulty tiers.
TAGS: Checkers, Board Game, Strategy, AI, Classics, Premium
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grandmaster Checkers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1b4d3e;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden; /* Prevent scrolling */
            font-family: 'Inter', sans-serif;
        }

        /* Top Navigation Bar */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 100;
            height: 80px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #turn-indicator {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.25rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-width: 140px;
        }

        .stylized-title {
            font-family: 'Cinzel', serif;
            font-size: 1.75rem;
            letter-spacing: 0.1em;
            background: linear-gradient(to bottom, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            display: flex;
            align-items: flex-start;
        }

        .version-tag {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: normal;
            -webkit-text-fill-color: white; /* Override parent gradient text fill */
            opacity: 0.4;
            margin-left: 8px;
            font-weight: 400;
            text-transform: lowercase;
        }

        /* Responsive Board Container */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: min(85vw, 65vh);
            height: min(85vw, 65vh);
            border: 8px solid #2c2c2c;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .square {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .square.dark { background-color: #404040; }
        .square.light { background-color: #d1d1d1; }

        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Multi-layered shadow for depth and contact */
            box-shadow: 
                inset 0 -5px 8px rgba(0,0,0,0.6), 
                inset 0 5px 8px rgba(255,255,255,0.3),
                0 6px 12px rgba(0,0,0,0.4);
        }

        /* Shine/Highlight Layer */
        .piece::before {
            content: '';
            position: absolute;
            top: 8%;
            left: 15%;
            width: 70%;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 11;
        }

        .piece.red { 
            background: radial-gradient(circle at 35% 35%, #ff6b6b 0%, #d00000 70%, #800000 100%);
        }
        
        .piece.black { 
            background: radial-gradient(circle at 35% 35%, #555 0%, #1a1a1a 70%, #000 100%);
        }

        .piece.king::after {
            content: '👑';
            font-size: clamp(1.5rem, 5vh, 3.5rem);
            color: gold;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            z-index: 12;
        }

        .piece.selected {
            transform: scale(1.1);
            box-shadow: 
                0 0 15px 5px yellow,
                inset 0 -5px 8px rgba(0,0,0,0.6), 
                inset 0 5px 8px rgba(255,255,255,0.3);
        }

        .valid-move::after {
            content: '';
            width: 15px;
            height: 15px;
            background-color: rgba(0, 255, 0, 0.4);
            border-radius: 50%;
        }

        .valid-capture::after {
            content: '';
            width: 25px;
            height: 25px;
            border: 3px solid rgba(255, 0, 0, 0.5);
            border-radius: 50%;
        }

        .difficulty-pill button, .toggle-btn {
            transition: all 0.2s ease;
        }
        .difficulty-pill button.active {
            background-color: white;
            color: #1b4d3e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* End Game Overlay */
        #end-screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .firework {
            position: fixed; /* Changed to fixed to ensure screen-wide coverage */
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2000; /* Extremely high z-index to stay above overlay (100) */
            box-shadow: 0 0 10px white;
        }

        /* Sound Toggle Styles */
        .toggle-btn.active {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div id="turn-indicator">
                <div class="text-[10px] uppercase tracking-tighter opacity-60">Turn</div>
                <div id="turn-text" class="text-sm font-black whitespace-nowrap">Red's Move</div>
            </div>
            <h1 class="stylized-title hidden sm:flex">
                Checkers
                <span class="version-tag">v1.05</span>
            </h1>
        </div>

        <div class="flex items-center gap-3">
            <!-- Sound Toggle -->
            <button id="sound-toggle" onclick="toggleSound()" class="toggle-btn bg-black/30 border border-white/10 p-2 rounded-xl text-xs flex items-center gap-1 active">
                <span id="sound-icon">🔊</span> <span class="hidden md:inline">Sound</span>
            </button>

            <div class="difficulty-pill flex bg-black/30 p-1 rounded-xl border border-white/10">
                <button onclick="setDifficulty('2p')" id="btn-2p" class="px-3 py-1 rounded-lg text-xs font-bold">2P</button>
                <button onclick="setDifficulty('easy')" id="btn-easy" class="px-3 py-1 rounded-lg text-xs font-bold">Easy</button>
                <button onclick="setDifficulty('medium')" id="btn-medium" class="px-3 py-1 rounded-lg text-xs font-bold">Med</button>
                <button onclick="setDifficulty('hard')" id="btn-hard" class="px-3 py-1 rounded-lg text-xs font-bold active">Hard</button>
            </div>
            <button onclick="resetGame()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase transition-all active:scale-95">
                Reset
            </button>
        </div>
    </header>

    <main id="game-area">
        <div id="board"></div>
        <div id="game-msg" class="mt-4 text-xs opacity-50 italic">
            Select a piece to begin the game
        </div>

        <!-- End Game Overlay -->
        <div id="end-screen">
            <h2 id="winner-text" class="text-5xl md:text-7xl font-black tracking-tighter mb-4 text-white uppercase italic">Red Wins!</h2>
            <p id="winner-sub" class="text-lg opacity-80 mb-8">Victory is yours!</p>
            <button onclick="resetGame()" class="bg-white text-black px-12 py-4 rounded-full font-black uppercase text-lg tracking-widest hover:scale-105 active:scale-95 transition-all shadow-2xl">
                New Game
            </button>
        </div>
    </main>

    <script>
        const EMPTY = 0, RED = 1, BLACK = 2, RED_KING = 3, BLACK_KING = 4;
        let board = [];
        let currentPlayer = RED;
        let selectedSquare = null;
        let validMoves = [];
        let gameActive = true;
        let currentDifficulty = 'hard';
        let soundEnabled = true;

        const boardEl = document.getElementById('board');
        const turnTextEl = document.getElementById('turn-text');
        const messageEl = document.getElementById('game-msg');
        const endScreenEl = document.getElementById('end-screen');
        const winnerTextEl = document.getElementById('winner-text');
        const winnerSubEl = document.getElementById('winner-sub');

        // --- Sound System (Web Audio API) ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;

            if (type === 'move') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'jump') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'king') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'firework') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(1, now + 0.4);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('sound-toggle');
            const icon = document.getElementById('sound-icon');
            if (soundEnabled) {
                btn.classList.add('active');
                icon.innerText = '🔊';
            } else {
                btn.classList.remove('active');
                icon.innerText = '🔈';
            }
        }

        // --- Game Logic ---

        function setDifficulty(diff) {
            currentDifficulty = diff;
            ['2p', 'easy', 'medium', 'hard'].forEach(id => {
                const el = document.getElementById(`btn-${id}`);
                if (el) el.classList.remove('active');
            });
            const activeEl = document.getElementById(`btn-${diff}`);
            if (activeEl) activeEl.classList.add('active');
            
            if (gameActive && currentPlayer === BLACK && diff !== '2p') {
                runAI();
            }
        }

        function initGame() {
            board = Array(64).fill(EMPTY);
            for (let i = 0; i < 64; i++) {
                let row = Math.floor(i / 8);
                let col = i % 8;
                if ((row + col) % 2 !== 0) {
                    if (row < 3) board[i] = BLACK;
                    if (row > 4) board[i] = RED;
                }
            }
            renderBoard();
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const row = Math.floor(i / 8);
                const col = i % 8;
                const square = document.createElement('div');
                square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                
                const pieceType = board[i];
                if (pieceType !== EMPTY) {
                    const piece = document.createElement('div');
                    piece.className = `piece ${isRed(pieceType) ? 'red' : 'black'} ${isKing(pieceType) ? 'king' : ''}`;
                    if (selectedSquare === i) piece.classList.add('selected');
                    piece.onclick = (e) => {
                        e.stopPropagation();
                        handleSquareClick(i);
                    };
                    square.appendChild(piece);
                }

                const move = validMoves.find(m => m.to === i);
                if (move) {
                    square.classList.add(move.captured !== null ? 'valid-capture' : 'valid-move');
                    square.style.cursor = 'pointer';
                    square.onclick = () => handleSquareClick(i);
                }

                boardEl.appendChild(square);
            }
            updateStatusUI();
        }

        function handleSquareClick(index) {
            if (!gameActive) return;
            if (currentPlayer === BLACK && currentDifficulty !== '2p') return;

            const piece = board[index];
            const move = validMoves.find(m => m.to === index);

            if (move) {
                executeMove(move);
                return;
            }

            if (piece !== EMPTY && belongsToPlayer(piece, currentPlayer)) {
                selectedSquare = index;
                validMoves = getValidMovesForPiece(board, index);
                const allJumps = getAllJumps(board, currentPlayer);
                if (allJumps.length > 0) {
                    validMoves = validMoves.filter(m => m.captured !== null);
                }
            } else {
                selectedSquare = null;
                validMoves = [];
            }
            renderBoard();
        }

        function executeMove(move) {
            let captured = move.captured !== null;
            let kinged = false;

            board[move.to] = board[move.from];
            board[move.from] = EMPTY;

            if (move.captured !== null) board[move.captured] = EMPTY;

            if (board[move.to] === RED && Math.floor(move.to / 8) === 0) { board[move.to] = RED_KING; kinged = true; }
            if (board[move.to] === BLACK && Math.floor(move.to / 8) === 7) { board[move.to] = BLACK_KING; kinged = true; }

            // Audio Logic
            if (kinged) playSound('king');
            else if (captured) playSound('jump');
            else playSound('move');

            // Multi-jump logic
            if (move.captured !== null && !kinged) {
                const followUps = getValidMovesForPiece(board, move.to).filter(m => m.captured !== null);
                if (followUps.length > 0) {
                    selectedSquare = move.to;
                    validMoves = followUps;
                    renderBoard();
                    if (currentPlayer === BLACK && currentDifficulty !== '2p') {
                        setTimeout(runAI, 600);
                    }
                    return;
                }
            }

            selectedSquare = null;
            validMoves = [];
            currentPlayer = currentPlayer === RED ? BLACK : RED;
            renderBoard();

            if (gameActive && currentPlayer === BLACK && currentDifficulty !== '2p') {
                setTimeout(runAI, 600);
            }
        }

        function isRed(piece) { return piece === RED || piece === RED_KING; }
        function isKing(piece) { return piece === RED_KING || piece === BLACK_KING; }
        function belongsToPlayer(piece, player) {
            if (player === RED) return isRed(piece);
            return piece === BLACK || piece === BLACK_KING;
        }

        function getValidMovesForPiece(currentBoard, index) {
            const piece = currentBoard[index];
            const row = Math.floor(index / 8);
            const col = index % 8;
            const moves = [];
            const directions = [];
            if (piece === RED || isKing(piece)) directions.push({ dr: -1, dc: -1 }, { dr: -1, dc: 1 });
            if (piece === BLACK || isKing(piece)) directions.push({ dr: 1, dc: -1 }, { dr: 1, dc: 1 });

            directions.forEach(d => {
                let tr = row + d.dr, tc = col + d.dc;
                if (tr >= 0 && tr < 8 && tc >= 0 && tc < 8) {
                    if (currentBoard[tr * 8 + tc] === EMPTY) {
                        moves.push({ from: index, to: tr * 8 + tc, captured: null });
                    } else if (!belongsToPlayer(currentBoard[tr * 8 + tc], isRed(piece) ? RED : BLACK)) {
                        let jr = tr + d.dr, jc = tc + d.dc;
                        if (jr >= 0 && jr < 8 && jc >= 0 && jc < 8 && currentBoard[jr * 8 + jc] === EMPTY) {
                            moves.push({ from: index, to: jr * 8 + jc, captured: tr * 8 + tc });
                        }
                    }
                }
            });
            return moves;
        }

        function getAllJumps(currentBoard, player) {
            let jumps = [];
            for (let i = 0; i < 64; i++) {
                if (belongsToPlayer(currentBoard[i], player)) {
                    jumps = jumps.concat(getValidMovesForPiece(currentBoard, i).filter(m => m.captured !== null));
                }
            }
            return jumps;
        }

        function getAllLegalMoves(currentBoard, player) {
            const jumps = getAllJumps(currentBoard, player);
            if (jumps.length > 0) return jumps;
            let moves = [];
            for (let i = 0; i < 64; i++) {
                if (belongsToPlayer(currentBoard[i], player)) {
                    moves = moves.concat(getValidMovesForPiece(currentBoard, i));
                }
            }
            return moves;
        }

        function updateStatusUI() {
            const redPieces = board.filter(p => isRed(p)).length;
            const blackPieces = board.filter(p => p !== EMPTY && !isRed(p)).length;

            if (redPieces === 0) endGame(BLACK);
            else if (blackPieces === 0) endGame(RED);
            else if (getAllLegalMoves(board, currentPlayer).length === 0) {
                endGame(currentPlayer === RED ? BLACK : RED);
            } else {
                turnTextEl.innerText = currentPlayer === RED ? "Red's Move" : "Black's Move";
                turnTextEl.style.color = currentPlayer === RED ? "#ff4b4b" : "white";
            }
        }

        function endGame(winner) {
            gameActive = false;
            endScreenEl.style.display = 'flex';
            
            if (winner === RED) {
                winnerTextEl.innerText = "Red Wins!";
                winnerTextEl.style.color = "#ff4b4b";
                winnerSubEl.innerText = "Absolute Domination.";
                launchFireworks();
            } else {
                winnerTextEl.innerText = "Black Wins!";
                winnerTextEl.style.color = "#ffffff";
                winnerSubEl.innerText = "The shadows prevailed.";
            }
        }

        function launchFireworks() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const x = (Math.random() * 0.8 + 0.1) * window.innerWidth;
                    const y = (Math.random() * 0.6 + 0.1) * window.innerHeight;
                    createFireworkBurst(x, y);
                    playSound('firework');
                }, i * 400);
            }
        }

        function createFireworkBurst(x, y) {
            const colors = ['#ff4b4b', '#ffffff', '#ffd700', '#ff00ff', '#00ffff', '#ffa500'];
            for (let i = 0; i < 24; i++) {
                const fw = document.createElement('div');
                fw.className = 'firework';
                fw.style.left = x + 'px';
                fw.style.top = y + 'px';
                fw.style.background = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(fw);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 3 + Math.random() * 6;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                let life = 1.0;
                const interval = setInterval(() => {
                    life -= 0.015;
                    const curX = parseFloat(fw.style.left) + vx;
                    const curY = parseFloat(fw.style.top) + vy + (1.0 - life) * 2; // Add gravity effect
                    fw.style.left = curX + 'px';
                    fw.style.top = curY + 'px';
                    fw.style.opacity = life;
                    fw.style.transform = `scale(${life * 1.5})`;
                    if (life <= 0) {
                        clearInterval(interval);
                        fw.remove();
                    }
                }, 16);
            }
        }

        function resetGame() {
            currentPlayer = RED;
            selectedSquare = null;
            validMoves = [];
            gameActive = true;
            messageEl.innerText = "Select a piece to begin the game";
            endScreenEl.style.display = 'none';
            initGame();
        }

        function runAI() {
            if (!gameActive) return;
            let move;
            let legalMoves;

            if (selectedSquare !== null) {
                legalMoves = getValidMovesForPiece(board, selectedSquare).filter(m => m.captured !== null);
            } else {
                legalMoves = getAllLegalMoves(board, BLACK);
            }
            
            if (legalMoves.length === 0) return;

            if (currentDifficulty === 'easy') {
                move = legalMoves[Math.floor(Math.random() * legalMoves.length)];
            } else if (currentDifficulty === 'medium') {
                move = minimaxRoot(board, 2, true, selectedSquare);
            } else {
                move = minimaxRoot(board, 5, true, selectedSquare);
            }

            if (move) executeMove(move);
        }

        function evaluateBoard(tempBoard) {
            let score = 0;
            for (let i = 0; i < 64; i++) {
                const p = tempBoard[i];
                if (p === BLACK) score += 10;
                else if (p === BLACK_KING) score += 20;
                else if (p === RED) score -= 10;
                else if (p === RED_KING) score -= 20;
            }
            return score;
        }

        function minimaxRoot(currentBoard, depth, isMaximizing, restrictedPiece) {
            let moves;
            if (restrictedPiece !== null) {
                moves = getValidMovesForPiece(currentBoard, restrictedPiece).filter(m => m.captured !== null);
            } else {
                moves = getAllLegalMoves(currentBoard, BLACK);
            }

            let bestMove = null;
            let bestValue = -Infinity;
            for (let move of moves) {
                const val = minimax(simulateMove(currentBoard, move), depth - 1, -10000, 10000, !isMaximizing);
                if (val > bestValue) {
                    bestValue = val;
                    bestMove = move;
                }
            }
            return bestMove;
        }

        function minimax(tempBoard, depth, alpha, beta, isMaximizing) {
            if (depth === 0) return evaluateBoard(tempBoard);
            const moves = getAllLegalMoves(tempBoard, isMaximizing ? BLACK : RED);
            if (moves.length === 0) return isMaximizing ? -1000 : 1000;

            if (isMaximizing) {
                let best = -Infinity;
                for (let move of moves) {
                    best = Math.max(best, minimax(simulateMove(tempBoard, move), depth - 1, alpha, beta, false));
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) break;
                }
                return best;
            } else {
                let best = Infinity;
                for (let move of moves) {
                    best = Math.min(best, minimax(simulateMove(tempBoard, move), depth - 1, alpha, beta, true));
                    beta = Math.min(beta, best);
                    if (beta <= alpha) break;
                }
                return best;
            }
        }

        function simulateMove(currentBoard, move) {
            const newBoard = [...currentBoard];
            newBoard[move.to] = newBoard[move.from];
            newBoard[move.from] = EMPTY;
            if (move.captured !== null) newBoard[move.captured] = EMPTY;
            if (newBoard[move.to] === RED && Math.floor(move.to / 8) === 0) newBoard[move.to] = RED_KING;
            if (newBoard[move.to] === BLACK && Math.floor(move.to / 8) === 7) newBoard[move.to] = BLACK_KING;
            return newBoard;
        }

        initGame();
    </script>
</body>
