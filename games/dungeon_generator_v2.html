<!--
CATEGORY: TTRPG Tools
DESCRIPTION: Advanced procedural dungeon generator v2. Donjon-style bitmask algorithm with proper room wall padding, rich door types, D&D 5e content, relative encounter CR, PDF export, and external JSON data support.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  --tag-special:#8e44ad; --tag-empty:#2c3e50; --tag-stairs:#2980b9;
  --tag-boss:#c0392b; --tag-trivial:#2c7a2c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel2);padding:0.6rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--accent);flex-shrink:0}
header h1{font-size:1.2rem;color:var(--accent);letter-spacing:1px}
header span{font-size:0.75rem;color:var(--text-dim)}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:0.6rem;display:flex;flex-direction:column;gap:0.35rem}
.sidebar h2{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent2);padding:0.35rem 0 0.15rem;border-bottom:1px solid var(--border);margin-top:0.2rem}
.cg{display:flex;flex-direction:column;gap:0.12rem}
.cg label{font-size:0.68rem;color:var(--text-dim);font-weight:600}
.row2{display:flex;gap:5px}
.row2 .cg{flex:1}
select,input[type=text],input[type=number]{background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:0.25rem 0.35rem;border-radius:4px;font-size:0.78rem;width:100%}
select:focus,input:focus{outline:1px solid var(--accent2)}
input[type=range]{width:100%;accent-color:var(--accent2)}
.btn{padding:0.3rem 0.5rem;border:none;border-radius:4px;cursor:pointer;font-size:0.78rem;font-weight:600;transition:filter 0.15s;width:100%}
.btn:hover{filter:brightness(1.15)}
.btn-primary{background:var(--accent);color:#fff;margin-top:0.3rem;padding:0.45rem}
.btn-secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}

.canvas-area{flex:1;overflow:auto;background:#0a0a14;display:flex;align-items:flex-start;justify-content:flex-start;padding:20px;position:relative}
#dungeon-canvas{image-rendering:pixelated;display:block;cursor:crosshair}
.canvas-area.pan-mode{cursor:grab}
.canvas-area.pan-mode:active{cursor:grabbing}
.canvas-area.pan-mode #dungeon-canvas{cursor:grab}

.legend-header{background:var(--panel2);padding:0.45rem 0.8rem;font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);border-bottom:1px solid var(--border);flex-shrink:0}

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// CELL FLAGS (bitmask)
// ═══════════════════════════════════════════════════════════
const NOTHING   = 0x00000000;
const BLOCKED   = 0x00000001;
const ROOM      = 0x00000002;
const CORRIDOR  = 0x00000004;
const PERIMETER = 0x00000010;
const ENTRANCE  = 0x00000020;
const ARCH      = 0x40000000;
const DOOR      = 0x20000000;
const LOCKED    = 0x10000000;
const TRAPPED   = 0x08000000;
const SECRET    = 0x04000000;
const PORTC     = 0x02000000;
const STAIR_DN  = 0x01000000;
const STAIR_UP  = 0x00800000;
const ROOM_ID_MASK  = 0x0000FFC0;
const ROOM_ID_SHIFT = 6;
const OPEN_SPACE = ROOM | CORRIDOR;

const DIR = {
  n:{ r:-1, c: 0, wall_r:-1, wall_c: 0, next_r:-2, next_c: 0 },
  s:{ r: 1, c: 0, wall_r: 1, wall_c: 0, next_r: 2, next_c: 0 },
  e:{ r: 0, c: 1, wall_r: 0, wall_c: 1, next_r: 0, next_c: 2 },
  w:{ r: 0, c:-1, wall_r: 0, wall_c:-1, next_r: 0, next_c:-2 },
};
const DIRS = ['n','s','e','w'];

// ═══════════════════════════════════════════════════════════
// SEEDED RNG
// ═══════════════════════════════════════════════════════════
class RNG {
  constructor(seed) {
    if (typeof seed === 'string') {
      let h = 0;
      for (let i = 0; i < seed.length; i++) h = Math.imul(31, h) + seed.charCodeAt(i) | 0;
      seed = Math.abs(h);
    }
    this.seed = seed || Date.now();
    this._seed = this.seed;
  }
  next() { this._seed = (this._seed * 1664525 + 1013904223) & 0xffffffff; return (this._seed >>> 0) / 0x100000000; }
  int(lo, hi) { return lo + Math.floor(this.next() * (hi - lo + 1)); }
  pick(arr)   { return arr[Math.floor(this.next() * arr.length)]; }
  chance(pct) { return this.next() < pct / 100; }
  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(this.next() * (i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
}

// ═══════════════════════════════════════════════════════════
// DUNGEON GENERATOR
// ═══════════════════════════════════════════════════════════
class DungeonGen {
  constructor(cfg) {
    this.cfg = cfg;
    this.rng = new RNG(cfg.seed);
    this.n_rows = cfg.n_rows | 1;
    this.n_cols = cfg.n_cols | 1;

    const RS = { small:[2,4], medium:[3,7], large:[4,10], huge:[6,14], mix:[2,12] };
    const [rMin, rMax] = RS[cfg.roomSize] || RS.medium;
    this.room_min = rMin; this.room_max = rMax;
    const RC = { few:50, some:100, many:200, packed:400 };
    this.room_tries = RC[cfg.roomCount] || 100;
    this.cell = [];
    this.rooms = [];
    this.doors = [];
    this.stairs = [];
    for (let r = 0; r <= this.n_rows; r++) this.cell[r] = new Int32Array(this.n_cols + 1);
  }

  generate() {
    this._init_cells();
    this._place_rooms();
    const lay = this.cfg.layout;
    if (lay === 'dungeon' || lay === 'cavern') this._corridors();
    else if (lay === 'bsp') this._bsp_corridors();
    else this._bsp_corridors(); // rooms-only
    this._open_rooms();
    this._ensure_connectivity();
    if (this.cfg.removeDeadEnds > 0) this._remove_deadends();
    this._fix_doors();
    this._emplace_stairs();
    this._add_egress();
    return this;
  }

  // ── Shape mask ─────────────────────────────────────────
  _inShape(r, c) {
    const nr = this.n_rows, nc = this.n_cols;
    const rel_r = r / nr, rel_c = c / nc;
    const cr = rel_r - 0.5, cc = rel_c - 0.5;
    switch (this.cfg.dungeonShape) {
      case 'rectangle': return rel_r >= 0.1 && rel_r <= 0.9 && rel_c >= 0.05 && rel_c <= 0.95;
      case 'cross': return (rel_c >= 0.3 && rel_c <= 0.7) || (rel_r >= 0.3 && rel_r <= 0.7);
      case 'ring': { const d = Math.sqrt(cr*cr + cc*cc); return d >= 0.18 && d <= 0.44; }
      case 'round': return Math.sqrt(cr*cr + cc*cc) <= 0.44;
      default: return true;
    }
  }

  // ── Init ───────────────────────────────────────────────
  _init_cells() {
    for (let r = 0; r <= this.n_rows; r++)
      for (let c = 0; c <= this.n_cols; c++)
        if (r === 0 || r === this.n_rows || c === 0 || c === this.n_cols || !this._inShape(r, c))
          this.cell[r][c] = BLOCKED;
  }

  // ── Room placement ─────────────────────────────────────
  _place_rooms() {
    const max_rooms = this.room_tries;
    let attempts = 0;
    const symmetric = this.cfg.roomLayout === 'symmetric';

    while (this.rooms.length < max_rooms && attempts < max_rooms * 8) {
      attempts++;
      let h = this.rng.int(this.room_min, this.room_max);
      let w = this.rng.int(this.room_min, this.room_max);
      if (this.cfg.layout === 'cavern') {
        h = Math.max(this.room_min, Math.round(h * (0.7 + this.rng.next() * 0.6)));
        w = Math.max(this.room_min, Math.round(w * (0.7 + this.rng.next() * 0.6)));
      }
      let r = this.rng.int(1, this.n_rows - h - 2) | 1;
      let c = this.rng.int(1, this.n_cols - w - 2) | 1;

      if (!this._inShape(r + h/2, c + w/2)) continue;
      if (!this._room_overlaps(r, c, h, w)) {
        this._emplace_room(r, c, h, w);
        if (symmetric && this.rooms.length % 2 === 0) {
          const mr = this.n_rows - r - h;
          const mc = this.n_cols - c - w;
          if (mr > 0 && mc > 0 && !this._room_overlaps(mr, mc, h, w))
            this._emplace_room(mr, mc, h, w);
        }
      }
    }
  }

  _room_overlaps(r, c, h, w) {
    for (let rr = r - 2; rr <= r + h + 2; rr++)
      for (let cc = c - 2; cc <= c + w + 2; cc++) {
        if (rr < 0 || rr > this.n_rows || cc < 0 || cc > this.n_cols) return true;
        if (this.cell[rr][cc] & ROOM) return true;
      }
    return false;
  }

  _emplace_room(r, c, h, w) {
    const id = this.rooms.length + 1;
    const room = { id, r1:r, c1:c, r2:r+h-1, c2:c+w-1, area:h*w, doors:[] };
    this.rooms.push(room);
    const encoded = (id << ROOM_ID_SHIFT) & ROOM_ID_MASK;
    for (let rr = r; rr < r+h; rr++)
      for (let cc = c; cc < c+w; cc++)
        this.cell[rr][cc] = ROOM | encoded;
    // Mark 1-cell perimeter OUTSIDE the room
    for (let rr = Math.max(0, r-1); rr <= Math.min(this.n_rows, r+h); rr++)
      for (let cc = Math.max(0, c-1); cc <= Math.min(this.n_cols, c+w); cc++)
        if (!(this.cell[rr][cc] & ROOM))
          this.cell[rr][cc] |= PERIMETER;
  }

  // ── Labyrinthine corridors (recursive backtracker) ─────
  // KEY FIX: corridors SKIP PERIMETER cells → rooms always have 1-cell wall buffer
  _corridors() {
    for (let r = 1; r < this.n_rows; r += 2)
      for (let c = 1; c < this.n_cols; c += 2)
        if (this.cell[r][c] === NOTHING && this._inShape(r, c))
          this._corridor_from(r, c);
  }

  _corridor_from(r0, c0) {
    const stack = [[r0, c0]];
    this.cell[r0][c0] = (this.cell[r0][c0] & ~PERIMETER) | CORRIDOR;
    while (stack.length) {
      const [r, c] = stack[stack.length - 1];
      const dirs = this.rng.shuffle(DIRS);
      let moved = false;
      for (const d of dirs) {
        const { next_r, next_c, wall_r, wall_c } = DIR[d];
        const nr = r + next_r, nc = c + next_c;
        const wr = r + wall_r, wc = c + wall_c;
        if (nr < 1 || nr >= this.n_rows-1 || nc < 1 || nc >= this.n_cols-1) continue;
        const nv = this.cell[nr][nc];
        const wv = this.cell[wr][wc];
        // FIXED: skip PERIMETER cells — corridors never carve into room buffers
        if (nv & (ROOM | CORRIDOR | BLOCKED | ENTRANCE | PERIMETER)) continue;
        if (wv & (ROOM | BLOCKED | ENTRANCE | PERIMETER)) continue;
        this.cell[wr][wc] = (this.cell[wr][wc] & ~PERIMETER) | CORRIDOR;
        this.cell[nr][nc] = (nv & ~PERIMETER) | CORRIDOR;
        stack.push([nr, nc]);
        moved = true;
        break;
      }
      if (!moved) stack.pop();
    }
  }

  // ── BSP / L-shaped corridors ───────────────────────────
  _bsp_corridors() {
    const centers = this.rooms.map(rm => ({
      id: rm.id,
      r: Math.floor((rm.r1 + rm.r2) / 2),
      c: Math.floor((rm.c1 + rm.c2) / 2),
    }));
    if (centers.length < 2) return;
    const connected = new Set([0]);
    while (connected.size < centers.length) {
      let bestDist = Infinity, bestA = -1, bestB = -1;
      for (const a of connected)
        for (let b = 0; b < centers.length; b++) {
          if (connected.has(b)) continue;
          const d = Math.abs(centers[a].r-centers[b].r) + Math.abs(centers[a].c-centers[b].c);
          if (d < bestDist) { bestDist=d; bestA=a; bestB=b; }
        }
      this._carve_corridor(centers[bestA], centers[bestB]);
      connected.add(bestB);
    }
    const extras = Math.floor(this.rooms.length * 0.2);
    for (let i = 0; i < extras; i++) {
      const a = this.rng.int(0, centers.length-1), b = this.rng.int(0, centers.length-1);
      if (a !== b) this._carve_corridor(centers[a], centers[b]);
    }
  }

  _carve_corridor(a, b) {
    if (this.rng.chance(50)) { this._carve_h(a.r, a.c, b.c); this._carve_v(b.c, a.r, b.r); }
    else                     { this._carve_v(a.c, a.r, b.r); this._carve_h(b.r, a.c, b.c); }
  }

  _carve_h(row, c1, c2) {
    const lo = Math.min(c1,c2), hi = Math.max(c1,c2);
    for (let c = lo; c <= hi; c++) {
      const v = this.cell[row][c];
      if (v & (ROOM | PERIMETER | BLOCKED)) continue; // respect room walls & shape
      this.cell[row][c] = (v & ~PERIMETER) | CORRIDOR;
    }
  }

  _carve_v(col, r1, r2) {
    const lo = Math.min(r1,r2), hi = Math.max(r1,r2);
    for (let r = lo; r <= hi; r++) {
      const v = this.cell[r][col];
      if (v & (ROOM | PERIMETER | BLOCKED)) continue;
      this.cell[r][col] = (v & ~PERIMETER) | CORRIDOR;
    }
  }

  // ── Open rooms into corridors ──────────────────────────
  _open_rooms() { for (const room of this.rooms) this._open_room(room); }

  _open_room(room) {
    const sills = this._door_sills(room);
    if (!sills.length) return;
    const shuffle = this.rng.shuffle(sills);
    const doorSetting = this.cfg.doorDensity || 'normal';
    const roomExits = this.cfg.roomExits || 'normal';
    let n_opens;
    switch (roomExits) {
      case 'minimal': n_opens = Math.min(1, sills.length); break;
      case 'many':    n_opens = this.rng.int(2, Math.min(5, sills.length)); break;
      default:        n_opens = this.rng.int(1, Math.min(3, Math.ceil(sills.length / 2))); break;
    }
    if (doorSetting === 'none') n_opens = Math.max(1, n_opens); // still need 1 exit (arch)
    const used = new Set();
    for (let i = 0; i < shuffle.length && room.doors.length < n_opens; i++) {
      const sill = shuffle[i];
      const key = sill.door_r + ',' + sill.door_c;
      if (used.has(key)) continue;
      // Skip if any adjacent cell already has a door (no doors next to doors)
      let adjDoor = false;
      for (const dd of DIRS) {
        const adjR = sill.door_r + DIR[dd].r, adjC = sill.door_c + DIR[dd].c;
        if (adjR >= 0 && adjR <= this.n_rows && adjC >= 0 && adjC <= this.n_cols)
          if (this.cell[adjR][adjC] & ENTRANCE) { adjDoor = true; break; }
      }
      if (adjDoor) continue;
      used.add(key);
      let door_type = ARCH;
      const rr = this.rng.next();
      if (doorSetting === 'none') {
        door_type = ARCH;
      } else if (doorSetting === 'sparse') {
        if (rr < 0.02) door_type = SECRET;
        else if (rr < 0.04) door_type = PORTC;
        else if (rr < 0.12) door_type = LOCKED | DOOR;
        else if (rr < 0.28) door_type = DOOR;
      } else if (doorSetting === 'many') {
        if (rr < 0.05) door_type = SECRET;
        else if (rr < 0.09) door_type = PORTC;
        else if (rr < 0.28) door_type = LOCKED | DOOR;
        else if (rr < 0.80) door_type = DOOR;
      } else { // normal
        if (rr < 0.04) door_type = SECRET;
        else if (rr < 0.07) door_type = PORTC;
        else if (rr < 0.22) door_type = LOCKED | DOOR;
        else if (rr < 0.55) door_type = DOOR;
      }
      const encoded = (room.id << ROOM_ID_SHIFT) & ROOM_ID_MASK;
      this.cell[sill.door_r][sill.door_c] =
        (this.cell[sill.door_r][sill.door_c] & ~PERIMETER) |
        CORRIDOR | ENTRANCE | door_type | encoded;
      room.doors.push({ r:sill.door_r, c:sill.door_c, type:door_type, dir:sill.dir });
      this.doors.push({ r:sill.door_r, c:sill.door_c, type:door_type, room_id:room.id, dir:sill.dir });
    }
  }

  // FIXED: look for sills 2 cells away (through perimeter wall) for labyrinthine,
  //        AND 1 cell away (direct) for BSP/L-shape corridors.
  _door_sills(room) {
    const sills = [];
    const seen = new Set();
    for (let r = room.r1; r <= room.r2; r++) {
      for (let c = room.c1; c <= room.c2; c++) {
        if (!(this.cell[r][c] & ROOM)) continue;
        for (const d of DIRS) {
          const { r: dr, c: dc } = DIR[d];
          const wr = r + dr, wc = c + dc; // wall/perimeter cell
          if (wr < 1 || wr >= this.n_rows || wc < 1 || wc >= this.n_cols) continue;
          const wv = this.cell[wr][wc];
          if (wv & (ROOM | BLOCKED | ENTRANCE)) continue;
          // Case A: corridor directly adjacent (BSP)
          if (wv & CORRIDOR) {
            const key = `${wr},${wc}`;
            if (!seen.has(key)) { seen.add(key); sills.push({ door_r:wr, door_c:wc, dir:d }); }
            continue;
          }
          // Case B: corridor 2 cells away, separated by perimeter (labyrinthine fix)
          const cr = r + dr*2, cc = c + dc*2;
          if (cr < 1 || cr >= this.n_rows || cc < 1 || cc >= this.n_cols) continue;
          if (this.cell[cr][cc] & CORRIDOR) {
            const key = `${wr},${wc}`;
            if (!seen.has(key)) { seen.add(key); sills.push({ door_r:wr, door_c:wc, dir:d }); }
          }
        }
      }
    }
    return sills;
  }

  // ── Label rooms ─────────────────────────────────────────
  _label_rooms() {
    for (const room of this.rooms) {
      room.center_r = Math.floor((room.r1 + room.r2) / 2);
      room.center_c = Math.floor((room.c1 + room.c2) / 2);
    }
  }

  // ── Ensure all rooms are reachable ──────────────────────
  _ensure_connectivity() {
    this._label_rooms();
    if (this.rooms.length < 2) return;

    const isOpen = v => !!(v & (OPEN_SPACE | ENTRANCE));
    const floodFrom = (startR, startC) => {
      const visited = new Set();
      const queue = [[startR, startC]];
      visited.add(`${startR},${startC}`);
      while (queue.length) {
        const [r, c] = queue.shift();
        for (const d of DIRS) {
          const nr = r+DIR[d].r, nc = c+DIR[d].c;
          if (nr<0||nr>this.n_rows||nc<0||nc>this.n_cols) continue;
          const key = `${nr},${nc}`;
          if (visited.has(key)) continue;
          if (isOpen(this.cell[nr][nc])) { visited.add(key); queue.push([nr,nc]); }
        }
      }
      return visited;
    };

    let visited = floodFrom(this.rooms[0].center_r, this.rooms[0].center_c);

    for (const room of this.rooms) {
      const key = `${room.center_r},${room.center_c}`;
      if (visited.has(key)) continue;
      // Room is isolated — connect it to the nearest already-connected room
      let bestDist = Infinity, bestRoom = null;
      for (const other of this.rooms) {
        if (!visited.has(`${other.center_r},${other.center_c}`)) continue;
        const d = Math.abs(room.center_r-other.center_r)+Math.abs(room.center_c-other.center_c);
        if (d < bestDist) { bestDist=d; bestRoom=other; }
      }
      if (!bestRoom) continue;
      // Carve an L-shaped corridor
      if (this.rng.chance(50)) { this._carve_h(room.center_r, room.center_c, bestRoom.center_c); this._carve_v(bestRoom.center_c, room.center_r, bestRoom.center_r); }
      else                     { this._carve_v(room.center_c, room.center_r, bestRoom.center_r); this._carve_h(bestRoom.center_r, room.center_c, bestRoom.center_c); }
      // Re-open this room now that it has nearby corridors
      this._open_room(room);
      // Expand the visited set
      visited = floodFrom(this.rooms[0].center_r, this.rooms[0].center_c);
    }
  }

  // ── Exterior egress (edge exits) ────────────────────────
  _add_egress() {
    const egress = this.cfg.egress || 'none';
    if (egress === 'none') return;
    const count = egress === 'many' ? this.rng.int(3, 5) : this.rng.int(1, 2);
    let placed = 0;
    const attempts = count * 20;
    for (let i = 0; i < attempts && placed < count; i++) {
      const side = this.rng.int(0, 3); // 0=N, 1=S, 2=E, 3=W
      let r, c;
      if (side === 0) { r = 1; c = this.rng.int(1, this.n_cols-2); }
      else if (side === 1) { r = this.n_rows-2; c = this.rng.int(1, this.n_cols-2); }
      else if (side === 2) { r = this.rng.int(1, this.n_rows-2); c = this.n_cols-2; }
      else                 { r = this.rng.int(1, this.n_rows-2); c = 1; }
      // Find nearest corridor cell in the interior
      let found = false;
      for (let step = 1; step < 8 && !found; step++) {
        let tr = r, tc = c;
        if (side === 0) tr = r + step;
        else if (side === 1) tr = r - step;
        else if (side === 2) tc = c - step;
        else tc = c + step;
        if (tr < 1||tr>=this.n_rows-1||tc < 1||tc>=this.n_cols-1) break;
        if (this.cell[tr][tc] & CORRIDOR) {
          // Carve from that cell to the edge
          if (side === 0) for (let rr=tr; rr >= 0; rr--) { const v=this.cell[rr][tc]; if (!(v&ROOM)) this.cell[rr][tc]=(v&~(PERIMETER|BLOCKED))|CORRIDOR; }
          else if (side === 1) for (let rr=tr; rr<=this.n_rows-1; rr++) { const v=this.cell[rr][tc]; if (!(v&ROOM)) this.cell[rr][tc]=(v&~(PERIMETER|BLOCKED))|CORRIDOR; }
          else if (side === 2) for (let cc=tc; cc<=this.n_cols-1; cc++) { const v=this.cell[tr][cc]; if (!(v&ROOM)) this.cell[tr][cc]=(v&~(PERIMETER|BLOCKED))|CORRIDOR; }
          else for (let cc=tc; cc >= 0; cc--) { const v=this.cell[tr][cc]; if (!(v&ROOM)) this.cell[tr][cc]=(v&~(PERIMETER|BLOCKED))|CORRIDOR; }
          found = true; placed++;
        }
      }
    }
  }

  // ── Remove dead ends ────────────────────────────────────
  _remove_deadends() {
    const pct = this.cfg.removeDeadEnds;
    let removed = true;
    while (removed) {
      removed = false;
      for (let r = 1; r < this.n_rows; r++)
        for (let c = 1; c < this.n_cols; c++) {
          const cv = this.cell[r][c];
          if (!(cv & CORRIDOR) || cv & (ENTRANCE|ROOM|STAIR_UP|STAIR_DN)) continue;
          let neighbors = 0;
          for (const d of DIRS) {
            const nr = r+DIR[d].r, nc = c+DIR[d].c;
            if (nr<0||nr>this.n_rows||nc<0||nc>this.n_cols) continue;
            if (this.cell[nr][nc] & (OPEN_SPACE|ENTRANCE)) neighbors++;
          }
          if (neighbors === 1 && this.rng.chance(pct)) { this.cell[r][c] = NOTHING; removed = true; }
        }
    }
  }

  _fix_doors() {
    for (const d of this.doors) {
      if (!(this.cell[d.r][d.c] & (CORRIDOR|ROOM|ENTRANCE)))
        this.cell[d.r][d.c] |= CORRIDOR;
    }
  }

  // ── Stairs ──────────────────────────────────────────────
  _emplace_stairs() {
    const shuffled = this.rng.shuffle(this.rooms.slice());
    if (shuffled.length >= 1) {
      const rm = shuffled[0];
      this.cell[rm.center_r][rm.center_c] |= STAIR_UP;
      this.stairs.push({ r:rm.center_r, c:rm.center_c, dir:'up', room_id:rm.id });
    }
    if (shuffled.length >= 2) {
      const rm = shuffled[shuffled.length - 1];
      this.cell[rm.center_r][rm.center_c] |= STAIR_DN;
      this.stairs.push({ r:rm.center_r, c:rm.center_c, dir:'down', room_id:rm.id });
    }
  }

  // ── Widen corridors + doorways (post-process) ───────────
  _widen_corridors(width) {
    if (width < 2) return;
    const extra = width - 1;
    // Snapshot of original state (pre-widening)
    const snapshot = this.cell.map(row => new Int32Array(row));

    // Pass 1: widen plain corridor cells
    for (let r = 1; r < this.n_rows - 1; r++)
      for (let c = 1; c < this.n_cols - 1; c++) {
        if (!(snapshot[r][c] & CORRIDOR)) continue;
        if (snapshot[r][c] & (ENTRANCE|ROOM)) continue;
        for (let dr = 0; dr <= extra; dr++)
          for (let dc = 0; dc <= extra; dc++) {
            const nr = r+dr, nc = c+dc;
            if (nr >= this.n_rows-1 || nc >= this.n_cols-1) continue;
            const v = snapshot[nr][nc];
            if (v & (ROOM|ENTRANCE|BLOCKED)) continue;
            this.cell[nr][nc] = (v & ~PERIMETER) | CORRIDOR;
          }
      }

    // Pass 2: widen doorways to match corridor width
    // For each original entrance cell, spread it perpendicular to the corridor direction
    for (let r = 1; r < this.n_rows - 1; r++) {
      for (let c = 1; c < this.n_cols - 1; c++) {
        if (!(snapshot[r][c] & ENTRANCE)) continue;
        // Determine corridor orientation using corrected logic (N-S = spread E-W)
        const nOpen = r > 0 && (snapshot[r-1][c] & (OPEN_SPACE|ENTRANCE));
        const sOpen = r < this.n_rows-1 && (snapshot[r+1][c] & (OPEN_SPACE|ENTRANCE));
        const nsDir = !!(nOpen || sOpen); // true = N-S corridor → spread E-W

        const doorType  = snapshot[r][c] & (ARCH|DOOR|LOCKED|SECRET|PORTC|TRAPPED);
        const roomId    = (snapshot[r][c] & ROOM_ID_MASK) >> ROOM_ID_SHIFT;
        const roomEncoded = (roomId << ROOM_ID_SHIFT) & ROOM_ID_MASK;

        for (let step = 1; step <= extra; step++) {
          const nr = nsDir ? r        : r + step;
          const nc = nsDir ? c + step : c;
          if (nr >= this.n_rows-1 || nc >= this.n_cols-1) break;
          const cv2 = this.cell[nr][nc];
          if (cv2 & (ROOM|BLOCKED))  break; // hit solid wall
          if (!(cv2 & CORRIDOR))      break; // not a corridor cell (gap in widening)
          if (cv2 & ENTRANCE)         break; // already a door cell
          // Convert widened corridor cell to a matching entrance
          this.cell[nr][nc] = (cv2 & ~PERIMETER) | ENTRANCE | doorType | roomEncoded;
          // nsDir=true = N-S passage → horizontal door (dir 'n'), else E-W (dir 'e')
          this.doors.push({ r:nr, c:nc, type:doorType, room_id:roomId, dir: nsDir ? 'n' : 'e' });
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// ENCOUNTER CR CALCULATOR
// ═══════════════════════════════════════════════════════════
const XP_THRESHOLDS = [
  null,
  [25,50,75,100],[50,100,150,200],[75,150,225,400],[125,250,375,500],
  [250,500,750,1100],[300,600,900,1400],[350,750,1100,1700],[450,900,1400,2100],
  [550,1100,1600,2400],[600,1200,1900,2800],[800,1600,2400,3600],[1000,2000,3000,4500],
  [1100,2200,3400,5100],[1250,2500,3800,5700],[1400,2800,4300,6400],[1600,3200,4800,7200],
  [2000,3900,5900,8800],[2100,4200,6300,9500],[2400,4900,7300,10900],[2800,5700,8500,12700],
];

function calcEncounterRating(monsters, partySize, partyLevel) {
  if (!monsters || !monsters.length) return null;
  const totalXP = monsters.reduce((s, m) => s + m.xp * m.count, 0);
  const totalMonsters = monsters.reduce((s, m) => s + m.count, 0);
  let mult = totalMonsters === 1 ? 1 : totalMonsters === 2 ? 1.5 : totalMonsters <= 6 ? 2 : totalMonsters <= 10 ? 2.5 : totalMonsters <= 14 ? 3 : 4;
  if (partySize <= 2) mult *= 1.5;
  else if (partySize >= 6) mult *= 0.8;
  const adjXP = Math.floor(totalXP * mult);
  const thresh = XP_THRESHOLDS[Math.min(partyLevel, 20)];
  const party = thresh.map(t => t * partySize);
  let rating = adjXP < party[0] ? 'Trivial' : adjXP < party[1] ? 'Easy' : adjXP < party[2] ? 'Medium' : adjXP < party[3] ? 'Hard' : 'Deadly';
  return { rating, adjXP, totalXP, mult };
}

// ═══════════════════════════════════════════════════════════
// CONTENT GENERATOR
// ═══════════════════════════════════════════════════════════
class ContentGen {
  constructor(dungeon, cfg) {
    this.dungeon = dungeon;
    this.cfg = cfg;
    this.rng = new RNG(dungeon.rng.seed + '_content');
    this.level = cfg.level;
    this.partySize = cfg.partySize;
    this.motif = cfg.motif;
    this.difficulty = cfg.difficulty;
  }

  generate() {
    const rooms = this.dungeon.rooms;
    const diffPcts = { easy:0.25, medium:0.40, hard:0.55, deadly:0.70 };
    const monsterPct = diffPcts[this.difficulty] || 0.40;
    const treasurePct = 0.22;
    const trapPct = 0.12;
    const specialPct = this.cfg.specialRooms === 'many' ? 0.15 : this.cfg.specialRooms === 'none' ? 0 : 0.08;
    const sorted = rooms.slice().sort((a, b) => b.area - a.area);
    const bossRoom = sorted[0];

    // Ceiling height tables by motif
    const ceilingByMotif = {
      standard: ['8 ft','10 ft','10 ft','12 ft','15 ft','20 ft'],
      undead:   ['8 ft','8 ft','10 ft','12 ft','15 ft','30 ft (great vault)'],
      giant:    ['20 ft','25 ft','30 ft','40 ft','50 ft'],
      draconic: ['15 ft','20 ft','30 ft','40 ft','60 ft (great hall)'],
      cavern:   ['5 ft (low)','8 ft','10 ft','15 ft','20 ft','variable'],
      aquatic:  ['6 ft','8 ft','10 ft','flooded to ceiling'],
      fey:      ['12 ft','15 ft','20 ft','open sky (illusion)'],
      arcane:   ['10 ft','12 ft','15 ft','20 ft (vaulted)'],
    };

    for (const room of rooms) {
      let content;
      if (room === bossRoom && rooms.length > 2) content = this._genBoss(room);
      else {
        const r = this.rng.next();
        if (r < monsterPct) content = this._genMonster(room);
        else if (r < monsterPct + treasurePct) content = this._genTreasure(room);
        else if (r < monsterPct + treasurePct + trapPct) content = this._genTrap(room);
        else if (r < monsterPct + treasurePct + trapPct + specialPct) content = this._genSpecial(room);
        else content = this._genEmpty(room);
      }
      room.content = content;
      // Ceiling height
      const cTable = ceilingByMotif[this.motif] || ceilingByMotif.standard;
      room.ceilingHeight = this.rng.pick(cTable);
      // Generate door details for each door
      for (const door of room.doors) {
        door.detail = this._genDoorDetail(door.type);
      }
    }
    // Corridor notes
    this.corridorNotes = this._genCorridorNotes();
    this.wandering = this._genWanderingTable();
    return rooms;
  }

  _genCorridorNotes() {
    const features = DATA.corridorFeatures || INLINE_CORRIDOR_FEATURES;
    const LABELS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    // Find valid corridor cells for placement (not entrance/room/stair)
    const { cell, n_rows, n_cols } = this.dungeon;
    const corridorCells = [];
    for (let r = 1; r < n_rows - 1; r++)
      for (let c = 1; c < n_cols - 1; c++) {
        const v = cell[r][c];
        if ((v & CORRIDOR) && !(v & (ENTRANCE | ROOM | STAIR_UP | STAIR_DN)))
          corridorCells.push({ r, c });
      }
    const shuffledCells = this.rng.shuffle(corridorCells);

    // Sample ~30% of features; cap at 26 (one letter per note) and available cells
    const maxCount = Math.min(LABELS.length, shuffledCells.length);
    const count = Math.min(maxCount, Math.max(2, Math.floor(features.length * 0.3)));
    const pool = this.rng.shuffle(features.slice()).slice(0, count);

    const notes = [];
    pool.forEach((f, i) => {
      const pos = shuffledCells[i];
      notes.push({ id: i + 1, label: LABELS[i], text: f, r: pos.r, c: pos.c });
    });
    return notes;
  }

  _budget() {
    const xpByLevel = [0,25,50,75,100,150,200,250,300,400,500,600,800,1000,1100,1250,1400,1600,2000,2200,2500];
    const base = (xpByLevel[Math.min(this.level, 20)] || 100) * this.partySize;
    return Math.floor(base * ({ easy:0.5, medium:1.0, hard:1.5, deadly:2.5 }[this.difficulty] || 1.0));
  }

  _monstersForMotif() {
    const all = DATA.monsters.filter(m => {
      if (this.motif === 'standard') return true;
      return m.tags && (m.tags.includes(this.motif) || m.tags.includes('standard'));
    });
    return all.length ? all : DATA.monsters;
  }

  _genMonster(room) {
    const budget = this._budget();
    const pool = this._monstersForMotif().filter(m => m.xp <= budget * 1.5);
    if (!pool.length) return this._genEmpty(room);
    const monsters = [];
    let remaining = budget;
    let attempts = 0;
    while (remaining > 0 && attempts < 20) {
      attempts++;
      const affordable = pool.filter(m => m.xp <= remaining * 1.2);
      if (!affordable.length) break;
      const m = this.rng.pick(affordable);
      const existing = monsters.find(x => x.name === m.name);
      if (existing) existing.count++;
      else monsters.push({ name:m.name, cr:m.cr, xp:m.xp, count:1, spellcaster:m.spellcaster, spells:m.spells });
      remaining -= m.xp;
    }
    const totalXP = monsters.reduce((s, m) => s + m.xp * m.count, 0);
    const desc = monsters.map(m => m.count > 1 ? `${m.count}× ${m.name}` : m.name).join(', ');
    const features = [this.rng.pick(DATA.roomFeatures[this.motif] || DATA.roomFeatures.standard)];
    if (this.rng.chance(30)) features.push(...this._smallTreasure());
    const enc = calcEncounterRating(monsters, this.partySize, this.level);
    return { type:'monster', monsters, desc, totalXP, features, enc, description:`Encounter: ${desc} (${totalXP} XP)` };
  }

  _genBoss(room) {
    const pool = this._monstersForMotif();
    pool.sort((a, b) => b.xp - a.xp);
    const boss = pool[0];
    const minions_pool = pool.filter(m => m.xp <= boss.xp * 0.3);
    const minions = [];
    if (minions_pool.length && this.rng.chance(70)) {
      const m = this.rng.pick(minions_pool);
      minions.push({ name:m.name, cr:m.cr, xp:m.xp, count:this.rng.int(2,6), spellcaster:m.spellcaster });
    }
    const totalXP = boss.xp + minions.reduce((s, m) => s + m.xp * m.count, 0);
    const monsters = [{ name:boss.name, cr:boss.cr, xp:boss.xp, count:1, spellcaster:boss.spellcaster, spells:boss.spells }, ...minions];
    const desc = monsters.map(m => m.count > 1 ? `${m.count}× ${m.name}` : m.name).join(', ');
    const treasure = this._richTreasure();
    const enc = calcEncounterRating(monsters, this.partySize, this.level);
    return { type:'monster', boss:true, monsters, desc, totalXP, features:['Boss chamber', ...treasure], enc, description:`BOSS: ${desc} (${totalXP} XP)` };
  }

  _genTreasure(room) {
    const items = this._richTreasure();
    return { type:'treasure', features:items, description:`Treasure: ${items.join(', ')}` };
  }

  _smallTreasure() {
    const tier = Math.min(Math.ceil(this.level / 5) - 1, 3);
    return [this.rng.pick(DATA.treasures[tier].items)];
  }

  _richTreasure() {
    const tier = Math.min(Math.ceil(this.level / 5) - 1, 3);
    const t = DATA.treasures[tier];
    const gp = this.rng.int(t.gp[0], t.gp[1]);
    const items = [`${gp} gp`];
    for (let i = 0; i < this.rng.int(1,3); i++) items.push(this.rng.pick(t.items));
    return items;
  }

  _genTrap(room) {
    const trap = this.rng.pick(DATA.traps);
    const features = [this.rng.pick(DATA.roomFeatures[this.motif] || DATA.roomFeatures.standard)];
    return { type:'trap', trap, features, description:`Trap: ${trap.name} (DC ${trap.dc})` };
  }

  _genSpecial(room) {
    const pool = DATA.specialRooms[this.motif] || DATA.specialRooms.standard;
    const special = this.rng.pick(pool);
    return { type:'special', special, features:[special.desc], description:`Special: ${special.name}` };
  }

  _genEmpty(room) {
    const feature = this.rng.pick(DATA.roomFeatures[this.motif] || DATA.roomFeatures.standard);
    return { type:'empty', features:[feature], description:`Empty: ${feature}` };
  }

  _genDoorDetail(doorType) {
    const doors = DATA.doors;
    if (!doors) return null;
    const material  = this.rng.pick(doors.materials);
    let mechanism   = this.rng.pick(doors.mechanisms);

    if (doorType & PORTC)  mechanism = doors.mechanisms.find(m => m.id === 'guillotine') || mechanism;
    if (doorType & SECRET) mechanism = doors.mechanisms.find(m => m.id === 'sliding_pocket') || this.rng.pick([doors.mechanisms.find(m=>m.id==='pivot'), doors.mechanisms.find(m=>m.id==='sliding_pocket')].filter(Boolean)) || mechanism;

    let specialType = null;
    if (doorType & SECRET) {
      const secretPool = doors.special_types.filter(s => ['false_door','phase_door','illusionary'].includes(s.id));
      specialType = this.rng.pick(secretPool.length ? secretPool : doors.special_types);
    } else if (this.rng.chance(8)) {
      specialType = this.rng.pick(doors.special_types.filter(s => !['mimic','false_door','phase_door','illusionary'].includes(s.id)));
    }

    let lock = null;
    if (doorType & LOCKED) lock = this.rng.pick(doors.lock_types);

    const trapped = this.rng.chance(12);
    const trapInfo = trapped ? this.rng.pick(DATA.traps) : null;

    return { material:material.name, materialNotes:material.notes, mechanism:mechanism.name, mechanismNotes:mechanism.notes, specialType, lock, trapped, trapInfo };
  }

  _genWanderingTable() {
    const pool = this._monstersForMotif();
    const rolls = [[1,2],[3,4],[5,8],[9,12],[13,15],[16,18],[19,20]];
    return rolls.map(([lo,hi]) => {
      const m = this.rng.pick(pool);
      const cnt = this.rng.int(1,4);
      return { roll: lo===hi ? `${lo}` : `${lo}–${hi}`, encounter: cnt>1 ? `${cnt}× ${m.name}` : m.name };
    });
  }
}

// ═══════════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════════
class DungeonRenderer {
  constructor(canvas, dungeon, cfg) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.dungeon = dungeon;
    this.cfg = cfg;
    this.T = cfg.tileSize;
    this.colors = COLOR_SCHEMES[cfg.colorScheme] || COLOR_SCHEMES.dark;
    this.highlightRoom = null;
    this.corridorNotes = [];
  }

  render() {
    const { n_rows, n_cols, cell } = this.dungeon;
    const T = this.T, C = this.colors, ctx = this.ctx;
    this.canvas.width  = n_cols * T;
    this.canvas.height = n_rows * T;

    // Background
    ctx.fillStyle = C.void;
    ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

    // Floors
    for (let r = 0; r < n_rows; r++)
      for (let c = 0; c < n_cols; c++) {
        const v = cell[r][c];
        const x = c*T, y = r*T;
        if (v & ROOM) {
          const isHl = this.highlightRoom === ((v & ROOM_ID_MASK) >> ROOM_ID_SHIFT);
          ctx.fillStyle = isHl ? '#3a1a2a' : C.floor;
          ctx.fillRect(x, y, T, T);
        } else if (v & (CORRIDOR | ENTRANCE)) {
          ctx.fillStyle = C.corridor;
          ctx.fillRect(x, y, T, T);
        }
      }

    // Grid
    if (this.cfg.gridStyle !== 'none') {
      ctx.strokeStyle = C.grid;
      ctx.lineWidth = 0.5;
      for (let r = 0; r < n_rows; r++)
        for (let c = 0; c < n_cols; c++) {
          const v = cell[r][c];
          if (!(v & OPEN_SPACE) && !(v & ENTRANCE)) continue;
          const x = c*T, y = r*T;
          if (this.cfg.gridStyle === 'dot') { ctx.fillStyle = C.grid; ctx.fillRect(x, y, 1, 1); }
          else ctx.strokeRect(x, y, T, T);
        }
    }

    // Wall faces (cells adjacent to open space, not open themselves)
    // wallStyle='void' → walls are same as the void/background (no fill)
    const wallFaceColor = this.cfg.wallStyle === 'void' ? C.void : C.wallFace;
    for (let r = 0; r < n_rows; r++)
      for (let c = 0; c < n_cols; c++) {
        const v = cell[r][c];
        if (v & (OPEN_SPACE | ENTRANCE)) continue;
        let hasOpen = false;
        for (const d of DIRS) {
          const nr = r+DIR[d].r, nc = c+DIR[d].c;
          if (nr<0||nr>=n_rows||nc<0||nc>=n_cols) continue;
          if (cell[nr][nc] & (OPEN_SPACE|ENTRANCE)) { hasOpen = true; break; }
        }
        if (hasOpen) { ctx.fillStyle = wallFaceColor; ctx.fillRect(c*T, r*T, T, T); }
      }

    // Wall outlines
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 1.5;
    for (let r = 0; r < n_rows; r++)
      for (let c = 0; c < n_cols; c++) {
        const v = cell[r][c];
        if (!(v & OPEN_SPACE) && !(v & ENTRANCE)) continue;
        const x = c*T, y = r*T;
        const edges = [
          { dr:-1,dc:0, x1:x,   y1:y,   x2:x+T, y2:y   },
          { dr: 1,dc:0, x1:x,   y1:y+T, x2:x+T, y2:y+T },
          { dr:0,dc:-1, x1:x,   y1:y,   x2:x,   y2:y+T },
          { dr:0,dc: 1, x1:x+T, y1:y,   x2:x+T, y2:y+T },
        ];
        for (const e of edges) {
          const nr = r+e.dr, nc = c+e.dc;
          const nv = (nr>=0&&nr<n_rows&&nc>=0&&nc<n_cols) ? cell[nr][nc] : NOTHING;
          if (nv & (OPEN_SPACE|ENTRANCE)) {
            // Draw a wall at the boundary between a corridor cell and a room cell
            // (only when neither side has an ENTRANCE/door)
            const corridorRoomBoundary =
              ((v & CORRIDOR) && !(v & ENTRANCE) && (nv & ROOM) && !(nv & ENTRANCE)) ||
              ((v & ROOM)     && !(v & ENTRANCE) && (nv & CORRIDOR) && !(nv & ENTRANCE));
            if (!corridorRoomBoundary) continue;
          }
          ctx.beginPath(); ctx.moveTo(e.x1,e.y1); ctx.lineTo(e.x2,e.y2); ctx.stroke();
        }
      }

    // Doors
    for (const door of this.dungeon.doors) this._drawDoor(door);
    // Stairs
    for (const stair of this.dungeon.stairs) this._drawStair(stair);
    // Room numbers
    for (const room of this.dungeon.rooms) this._drawRoomLabel(room);
    // Corridor feature letters
    this._drawCorridorLabels();
  }

  _drawDoor(door) {
    const { r, c, type } = door;
    const T = this.T, C = this.colors, ctx = this.ctx;
    const x = c*T, y = r*T, cx2 = x+T/2, cy2 = y+T/2;

    // Determine passage orientation from stored dir (n/s = N-S passage = horizontal doorway)
    // Fall back to adjacency check if dir not stored
    let horiz;
    if (door.dir === 'n' || door.dir === 's') horiz = true;
    else if (door.dir === 'e' || door.dir === 'w') horiz = false;
    else {
      const cell = this.dungeon.cell;
      const nOpen = r>0 && (cell[r-1][c] & (OPEN_SPACE|ENTRANCE));
      const sOpen = r<this.dungeon.n_rows-1 && (cell[r+1][c] & (OPEN_SPACE|ENTRANCE));
      horiz = !!(nOpen || sOpen);
    }

    const jambW = Math.max(2, Math.round(T * 0.22)); // wall-jamb thickness
    const wallC = C.wallFace || C.wall;

    if (type & SECRET) {
      // Secret door: looks like a wall but has a faint dashed outline + 'S'
      ctx.fillStyle = wallC;
      ctx.fillRect(x, y, T, T);
      ctx.strokeStyle = C.secret; ctx.lineWidth = 0.8;
      ctx.setLineDash([2,2]); ctx.strokeRect(x+1,y+1,T-2,T-2); ctx.setLineDash([]);
      ctx.fillStyle = C.secret; ctx.font = `bold ${Math.max(7, T*0.38)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('S', cx2, cy2); return;
    }

    if (type & PORTC) {
      // Portcullis: wall jambs + parallel bars across the opening
      ctx.fillStyle = wallC;
      if (horiz) {
        ctx.fillRect(x, y, jambW, T);
        ctx.fillRect(x+T-jambW, y, jambW, T);
        // Horizontal bars spanning the gap
        ctx.strokeStyle = C.portc; ctx.lineWidth = Math.max(1, T*0.07);
        const openW = T - jambW*2, openX = x+jambW;
        for (let i = 1; i <= 3; i++) {
          const by = y + (T * i / 4);
          ctx.beginPath(); ctx.moveTo(openX, by); ctx.lineTo(openX+openW, by); ctx.stroke();
        }
        ctx.lineWidth = Math.max(1, T*0.05);
        ctx.beginPath(); ctx.moveTo(openX, y+2); ctx.lineTo(openX, y+T-2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(openX+openW, y+2); ctx.lineTo(openX+openW, y+T-2); ctx.stroke();
      } else {
        ctx.fillRect(x, y, T, jambW);
        ctx.fillRect(x, y+T-jambW, T, jambW);
        ctx.strokeStyle = C.portc; ctx.lineWidth = Math.max(1, T*0.07);
        const openH = T - jambW*2, openY = y+jambW;
        for (let i = 1; i <= 3; i++) {
          const bx = x + (T * i / 4);
          ctx.beginPath(); ctx.moveTo(bx, openY); ctx.lineTo(bx, openY+openH); ctx.stroke();
        }
        ctx.lineWidth = Math.max(1, T*0.05);
        ctx.beginPath(); ctx.moveTo(x+2, openY); ctx.lineTo(x+T-2, openY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+2, openY+openH); ctx.lineTo(x+T-2, openY+openH); ctx.stroke();
      }
      return;
    }

    if (type & ARCH) {
      // Archway: wall jambs with open gap; small arc to indicate arch
      ctx.fillStyle = wallC;
      if (horiz) {
        ctx.fillRect(x, y, jambW, T);
        ctx.fillRect(x+T-jambW, y, jambW, T);
        // Arch arc
        ctx.strokeStyle = C.entrance || C.doorFill; ctx.lineWidth = Math.max(1, T*0.06);
        ctx.beginPath(); ctx.arc(cx2, cy2, (T-jambW*2)*0.45, Math.PI, 0); ctx.stroke();
      } else {
        ctx.fillRect(x, y, T, jambW);
        ctx.fillRect(x, y+T-jambW, T, jambW);
        ctx.strokeStyle = C.entrance || C.doorFill; ctx.lineWidth = Math.max(1, T*0.06);
        ctx.beginPath(); ctx.arc(cx2, cy2, (T-jambW*2)*0.45, -Math.PI/2, Math.PI/2); ctx.stroke();
      }
      return;
    }

    // ── Standard / Locked / Trapped door ──
    // Draw wall jambs on both sides of the opening
    ctx.fillStyle = wallC;
    if (horiz) {
      ctx.fillRect(x, y, jambW, T);
      ctx.fillRect(x+T-jambW, y, jambW, T);
    } else {
      ctx.fillRect(x, y, T, jambW);
      ctx.fillRect(x, y+T-jambW, T, jambW);
    }

    // Door slab (thin filled rectangle across the opening)
    const slabThick = Math.max(2, Math.round(T * 0.12));
    ctx.fillStyle = C.doorFill;
    ctx.strokeStyle = C.door; ctx.lineWidth = 0.8;
    if (horiz) {
      const sx = x+jambW, sw = T-jambW*2;
      ctx.fillRect(sx, cy2-slabThick/2, sw, slabThick);
      ctx.strokeRect(sx, cy2-slabThick/2, sw, slabThick);
    } else {
      const sy = y+jambW, sh = T-jambW*2;
      ctx.fillRect(cx2-slabThick/2, sy, slabThick, sh);
      ctx.strokeRect(cx2-slabThick/2, sy, slabThick, sh);
    }

    // Lock mark: small red X
    if (type & LOCKED) {
      const s = T*0.12;
      ctx.strokeStyle = '#ff3333'; ctx.lineWidth = Math.max(1, T*0.06);
      ctx.beginPath();
      ctx.moveTo(cx2-s,cy2-s); ctx.lineTo(cx2+s,cy2+s);
      ctx.moveTo(cx2+s,cy2-s); ctx.lineTo(cx2-s,cy2+s);
      ctx.stroke();
    }

    // Trap mark: small orange 'T'
    if (type & TRAPPED) {
      ctx.fillStyle = '#ff8800';
      ctx.font = `bold ${Math.max(5, T*0.28)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('T', cx2, cy2);
    }
  }

  _drawStair(stair) {
    const T=this.T, ctx=this.ctx;
    const x=stair.c*T, y=stair.r*T, cx2=x+T/2, cy2=y+T/2;
    const color = stair.dir==='up' ? this.colors.stairUp : this.colors.stairDn;
    ctx.fillStyle = color+'44';
    ctx.beginPath(); ctx.arc(cx2,cy2,T*0.4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx2,cy2,T*0.4,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle = color; ctx.font = `bold ${Math.max(7,T*0.55)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(stair.dir==='up'?'▲':'▼', cx2, cy2);
  }

  _drawRoomLabel(room) {
    const T=this.T, ctx=this.ctx;
    let labelR = room.center_r, labelC = room.center_c;
    // Offset label away from center if a stair is placed there
    const cv = this.dungeon.cell[room.center_r][room.center_c];
    if (cv & (STAIR_UP | STAIR_DN)) {
      const roomH = room.r2 - room.r1 + 1, roomW = room.c2 - room.c1 + 1;
      if (roomH > 1 || roomW > 1) { labelR = room.r1; labelC = room.c1; }
    }
    const cx2 = labelC*T+T/2, cy2 = labelR*T+T/2;
    // Scale font with tile size; allow large sizes for big tiles
    const fs = Math.max(6, Math.min(T*0.55, 32));
    ctx.fillStyle = this.colors.roomNum; ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(room.id.toString(), cx2, cy2);
  }

  _drawCorridorLabels() {
    if (!this.corridorNotes || !this.corridorNotes.length) return;
    const T = this.T, ctx = this.ctx;
    const radius = Math.max(4, T * 0.38);
    const fs = Math.max(5, Math.min(T * 0.48, 22));
    for (const note of this.corridorNotes) {
      const cx2 = note.c * T + T / 2, cy2 = note.r * T + T / 2;
      // Circle background
      ctx.fillStyle = 'rgba(233,69,96,0.88)';
      ctx.beginPath(); ctx.arc(cx2, cy2, radius, 0, Math.PI * 2); ctx.fill();
      // Border
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(cx2, cy2, radius, 0, Math.PI * 2); ctx.stroke();
      // Letter
      ctx.fillStyle = '#fff'; ctx.font = `bold ${fs}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(note.label, cx2, cy2);
    }
  }
}

// LEGEND RENDERER
// ═══════════════════════════════════════════════════════════
function renderLegend(rooms, wandering, highlightId, cfg, corridorNotes) {
  const body = document.getElementById('legend-body');
  const C = COLOR_SCHEMES[cfg?.colorScheme] || COLOR_SCHEMES.dark;
  const wallC = C.wallFace || C.wall;

  // ── Symbol Key ──────────────────────────────────────────
  let html = `<div class="sym-legend">
    <div class="sym-legend-title">Map Symbol Key</div>
    <div class="sym-row"><span class="sym" style="background:${C.doorFill};color:${C.door};border-radius:2px">█</span><span>Door — wall jambs + slab</span></div>
    <div class="sym-row"><span class="sym" style="background:${C.doorFill};color:#f44;border-radius:2px;font-size:0.6rem">✕</span><span>Locked door (red X on slab)</span></div>
    <div class="sym-row"><span class="sym" style="color:#ff8800;font-weight:700;font-size:0.65rem">T</span><span>Trapped door (orange T)</span></div>
    <div class="sym-row"><span class="sym" style="background:${C.corridor};border:1px solid ${C.entrance||C.doorFill};border-radius:2px;font-size:0.55rem">▭</span><span>Archway — open passage (arc)</span></div>
    <div class="sym-row"><span class="sym" style="background:${wallC};border:1px dashed ${C.secret};border-radius:2px;color:${C.secret}">S</span><span>Secret door (dashed wall + S)</span></div>
    <div class="sym-row"><span class="sym" style="background:${wallC};border-radius:2px;color:${C.portc}">⊞</span><span>Portcullis (barred grate)</span></div>
    <div class="sym-row"><span class="sym" style="background:${C.stairUp}44;border:1px solid ${C.stairUp};border-radius:50%;color:${C.stairUp};font-size:0.6rem">▲</span><span>Stairs up / entrance</span></div>
    <div class="sym-row"><span class="sym" style="background:${C.stairDn}44;border:1px solid ${C.stairDn};border-radius:50%;color:${C.stairDn};font-size:0.6rem">▼</span><span>Stairs down / exit</span></div>
    <div class="sym-row"><span style="width:18px;height:18px;display:inline-block;background:${C.floor};border:1px solid ${C.outline};flex-shrink:0"></span><span>Room floor</span></div>
    <div class="sym-row"><span style="width:18px;height:18px;display:inline-block;background:${C.corridor};border:1px solid ${C.outline};flex-shrink:0"></span><span>Corridor</span></div>
    <div class="sym-row"><span style="width:18px;height:18px;display:inline-block;background:${wallC};flex-shrink:0"></span><span>Wall</span></div>
  </div>`;

  // ── Corridor Features ────────────────────────────────────
  if (corridorNotes && corridorNotes.length) {
    html += '<div class="wmt"><div class="wmt-header">Corridor Features</div><table>';
    for (const n of corridorNotes) {
      html += `<tr class="corridor-note" data-note="${n.label}" title="Click to highlight on map" style="cursor:pointer"><td><span class="corridor-label-badge">${n.label}</span></td><td>${n.text}</td></tr>`;
    }
    html += '</table></div>';
  }

  // ── Wandering Monsters ──────────────────────────────────
  html += '<div class="wmt"><div class="wmt-header">Wandering Monsters (d20)</div><table>';
  for (const row of wandering) html += `<tr><td>${row.roll}</td><td>${row.encounter}</td></tr>`;
  html += '</table></div>';

  // ── Room Entries ────────────────────────────────────────
  const level = parseInt(cfg?.level) || 3;
  const partySize = parseInt(cfg?.partySize) || 4;

  for (const room of rooms) {
    const c = room.content || { type:'empty', features:[], description:'' };
    const tagMap = { monster:'tag-monster', treasure:'tag-treasure', trap:'tag-trap', special:'tag-special', empty:'tag-empty' };
    const tagClass = tagMap[c.type] || 'tag-empty';
    const bossTag = c.boss ? '<span class="tag tag-boss">BOSS</span>' : '';
    const hlClass = highlightId === room.id ? ' highlighted' : '';

    // Encounter difficulty tag
    let encTag = '';
    if (c.enc) {
      const ratingClass = { Trivial:'tag-trivial', Easy:'tag-easy', Medium:'tag-medium', Hard:'tag-hard', Deadly:'tag-deadly' }[c.enc.rating] || 'tag-empty';
      encTag = `<span class="tag ${ratingClass}">${c.enc.rating}</span>`;
    }

    html += `<div class="room-entry${hlClass}" data-room="${room.id}">`;
    html += `<h3>Room ${room.id} <span class="tag ${tagClass}">${c.type.toUpperCase()}</span>${bossTag}${encTag}</h3>`;
    html += '<ul>';

    const w = room.c2-room.c1+1, h = room.r2-room.r1+1;
    html += `<li>${w}×${h} tiles (${w*5}×${h*5} ft)</li>`;
    if (room.ceilingHeight) html += `<li>Ceiling: ${room.ceilingHeight}</li>`;

    if (c.type === 'monster') {
      html += `<li>${c.desc}</li>`;
      html += `<li>XP: ${c.totalXP}`;
      if (c.enc) html += ` — <strong>${c.enc.rating}</strong> for ${partySize} × Lv${level} (adj. ${c.enc.adjXP} XP)`;
      html += '</li>';
      // Spellcasters
      const casters = (c.monsters || []).filter(m => m.spellcaster && m.spells?.length);
      for (const m of casters)
        html += `<li><em>${m.name} spells:</em> ${m.spells.join(', ')}</li>`;
    }
    if (c.type === 'trap') {
      html += `<li>${c.trap.name} (DC ${c.trap.dc})</li>`;
      html += `<li>${c.trap.dmg} — ${c.trap.effect}</li>`;
    }
    if (c.type === 'special') {
      html += `<li>${c.special.name}</li>`;
      html += `<li>${c.special.desc}</li>`;
    }
    for (const f of (c.features || [])) html += `<li>${f}</li>`;

    // Doors with full detail
    if (room.doors?.length) {
      html += '<li>Exits:</li>';
      for (const door of room.doors) {
        let label = door.type & SECRET ? 'Secret door' : door.type & PORTC ? 'Portcullis' : door.type & LOCKED ? 'Locked door' : door.type & DOOR ? 'Door' : 'Open arch';
        html += `<li style="padding-left:0.6rem"><strong>${label}</strong>`;
        const det = door.detail;
        if (det) {
          html += `<br><span class="door-detail">${det.material}`;
          if (det.materialNotes) html += ` — ${det.materialNotes}`;
          html += `; ${det.mechanism}`;
          if (det.mechanismNotes) html += ` (${det.mechanismNotes})`;
          if (det.specialType) html += `<br><em>Special: ${det.specialType.name} — ${det.specialType.effect}</em>`;
          if (det.lock) html += `<br><em>Lock: ${det.lock.name} (DC ${det.lock.dc}) — ${det.lock.notes}</em>`;
          if (det.trapped && det.trapInfo) html += `<br><em>Trap: ${det.trapInfo.name} (DC ${det.trapInfo.dc}) — ${det.trapInfo.effect}</em>`;
          html += '</span>';
        }
        html += '</li>';
      }
    }
    html += '</ul></div>';
  }

  body.innerHTML = html;
  body.querySelectorAll('.room-entry').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.room);
      if (window._currentDungeon) highlightRoomOnMap(id);
    });
  });
  body.querySelectorAll('.corridor-note').forEach(el => {
    el.addEventListener('click', () => {
      const label = el.dataset.note;
      const note = _content?.corridorNotes?.find(n => n.label === label);
      if (note && note.r !== undefined && _renderer) {
        // Pan canvas area to the corridor cell
        const scale = parseInt(document.getElementById('zoom').value) / 100;
        const T = _renderer.T;
        const canvasArea = document.getElementById('canvas-area');
        const targetX = note.c * T * scale + 20 - canvasArea.clientWidth / 2;
        const targetY = note.r * T * scale + 20 - canvasArea.clientHeight / 2;
        canvasArea.scrollTo({ left: Math.max(0, targetX), top: Math.max(0, targetY), behavior: 'smooth' });
      }
      // Highlight this row briefly
      body.querySelectorAll('.corridor-note').forEach(r => r.classList.remove('highlighted'));
      el.classList.add('highlighted');
    });
  });
}

// ═══════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════
let _dungeon = null, _renderer = null, _content = null, _lastCfg = null;

function highlightRoomOnMap(roomId) {
  if (!_renderer) return;
  _renderer.highlightRoom = _renderer.highlightRoom === roomId ? null : roomId;
  _renderer.render();
  renderLegend(_dungeon.rooms, _content.wandering, _renderer.highlightRoom, _lastCfg, _content.corridorNotes);
}

function buildConfig() {
  const sizes = { fine:[9,9], diminutive:[19,19], tiny:[39,39], small:[59,59], medium:[79,79], large:[99,99], huge:[119,119] };
  const [rows, cols] = sizes[document.getElementById('dungeon-size').value] || [79,79];
  const seedInput = document.getElementById('seed').value.trim();
  const seed = seedInput || String(Math.floor(Math.random() * 9999999));
  document.getElementById('seed-display').textContent = 'Seed: ' + seed;
  return {
    n_rows:rows, n_cols:cols, seed,
    layout:         document.getElementById('layout').value,
    dungeonShape:   document.getElementById('dungeon-shape').value,
    roomSize:       document.getElementById('room-size').value,
    roomCount:      document.getElementById('room-count').value,
    roomLayout:     document.getElementById('room-layout').value,
    corridorStyle:  document.getElementById('corridor-style').value,
    removeDeadEnds: parseInt(document.getElementById('remove-deadends').value),
    doorDensity:    document.getElementById('door-density').value,
    roomExits:      document.getElementById('room-exits').value,
    egress:         document.getElementById('egress').value,
    level:          parseInt(document.getElementById('dungeon-level').value),
    partySize:      parseInt(document.getElementById('party-size').value),
    difficulty:     document.getElementById('difficulty').value,
    motif:          document.getElementById('motif').value,
    specialRooms:   document.getElementById('special-rooms').value,
    wallStyle:      document.getElementById('wall-style').value,
    colorScheme:    document.getElementById('color-scheme').value,
    gridStyle:      document.getElementById('grid-style').value,
    tileSize:       parseInt(document.getElementById('tile-size').value),
  };
}

function generateDungeon() {
  const loading = document.getElementById('loading');
  loading.classList.add('show');
  setTimeout(() => {
    try {
      const cfg = buildConfig();
      _lastCfg = cfg;
      const dungeon = new DungeonGen(cfg).generate();
      _dungeon = dungeon;
      window._currentDungeon = dungeon;
      const cgen = new ContentGen(dungeon, cfg);
      cgen.generate();
      _content = cgen;
      const canvas = document.getElementById('dungeon-canvas');
      _renderer = new DungeonRenderer(canvas, dungeon, cfg);
      _renderer.corridorNotes = cgen.corridorNotes;
      _renderer.render();
      applyZoom(parseInt(document.getElementById('zoom').value));
      renderLegend(dungeon.rooms, cgen.wandering, null, cfg, cgen.corridorNotes);
      document.getElementById('stats-display').textContent = `${dungeon.rooms.length} rooms · ${dungeon.doors.length} doors · seed: ${cfg.seed}`;
    } catch(e) { console.error(e); alert('Generation error: ' + e.message); }
    loading.classList.remove('show');
  }, 30);
}

function applyZoom(pct) {
  const canvas = document.getElementById('dungeon-canvas');
  canvas.style.transform = `scale(${pct/100})`;
  canvas.style.transformOrigin = 'top left';
  document.getElementById('zoom-label').textContent = pct + '%';
}

// ── Pan state (shared between click guard and drag handlers) ──
const PAN_THRESHOLD = 3; // pixels of movement before treating as a drag
const ZOOM_STEP = 5, ZOOM_MIN = 1, ZOOM_MAX = 300;
const _panState = { active: false, moved: false, x: 0, y: 0, scrollX: 0, scrollY: 0 };

// Canvas click
document.getElementById('dungeon-canvas').addEventListener('click', (e) => {
  if (_panState.moved) return; // was a drag, not a click
  if (!_dungeon || !_renderer) return;
  const canvas = document.getElementById('dungeon-canvas');
  const scale = parseInt(document.getElementById('zoom').value) / 100;
  const rect = canvas.getBoundingClientRect();
  const col = Math.floor((e.clientX-rect.left)/scale / _renderer.T);
  const row = Math.floor((e.clientY-rect.top) /scale / _renderer.T);
  if (row<0||row>=_dungeon.n_rows||col<0||col>=_dungeon.n_cols) return;
  const cv = _dungeon.cell[row][col];
  if (cv & ROOM) {
    const id = (cv & ROOM_ID_MASK) >> ROOM_ID_SHIFT;
    highlightRoomOnMap(id);
    document.querySelector(`[data-room="${id}"]`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
  } else {
    // Check if clicking on a corridor feature label
    const note = _content?.corridorNotes?.find(n => n.r === row && n.c === col);
    if (note) {
      const legendBody = document.getElementById('legend-body');
      const noteEl = legendBody.querySelector(`[data-note="${note.label}"]`);
      if (noteEl) {
        legendBody.querySelectorAll('.corridor-note').forEach(r => r.classList.remove('highlighted'));
        noteEl.classList.add('highlighted');
        noteEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }
    }
  }
});

document.getElementById('zoom').addEventListener('input', e => applyZoom(parseInt(e.target.value)));
document.getElementById('btn-generate').addEventListener('click', generateDungeon);
document.getElementById('ui-theme').addEventListener('change', e => applyUITheme(e.target.value));

// ── Mouse wheel zoom ─────────────────────────────────────
document.getElementById('canvas-area').addEventListener('wheel', (e) => {
  e.preventDefault();
  const slider = document.getElementById('zoom');
  let pct = parseInt(slider.value);
  pct = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pct + (e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP)));
  slider.value = pct;
  applyZoom(pct);
}, { passive: false });

// ── Click-and-drag to pan the map ────────────────────────
{
  const canvasArea = document.getElementById('canvas-area');
  canvasArea.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    _panState.active = true;
    _panState.moved = false;
    _panState.x = e.clientX; _panState.y = e.clientY;
    _panState.scrollX = canvasArea.scrollLeft;
    _panState.scrollY = canvasArea.scrollTop;
    canvasArea.classList.add('pan-mode');
  });
  window.addEventListener('mousemove', (e) => {
    if (!_panState.active) return;
    const dx = e.clientX - _panState.x, dy = e.clientY - _panState.y;
    if (Math.abs(dx) > PAN_THRESHOLD || Math.abs(dy) > PAN_THRESHOLD) _panState.moved = true;
    if (_panState.moved) {
      canvasArea.scrollLeft = _panState.scrollX - dx;
      canvasArea.scrollTop  = _panState.scrollY - dy;
    }
  });
  window.addEventListener('mouseup', () => {
    _panState.active = false;
    canvasArea.classList.remove('pan-mode');
  });
}

// ── Map Image Export (PNG / JPG / WebP) ─────────────────
document.getElementById('btn-png').addEventListener('click', () => {
  if (!_dungeon) return alert('Generate a dungeon first.');
  const fmt = document.getElementById('img-format').value;
  const ext = { 'image/png':'png', 'image/jpeg':'jpg', 'image/webp':'webp' }[fmt] || 'png';
  const quality = fmt === 'image/png' ? undefined : 0.93; // PNG ignores quality param
  const a = document.createElement('a');
  a.href = document.getElementById('dungeon-canvas').toDataURL(fmt, quality);
  a.download = `dungeon_${_dungeon.rng.seed}.${ext}`;
  a.click();
});

      for (const door of room.doors) {
        let label = door.type&SECRET?'Secret door':door.type&PORTC?'Portcullis':door.type&LOCKED?'Locked door':door.type&DOOR?'Door':'Open arch';
        html += `<br>&nbsp;&nbsp;• <strong>${label}</strong>`;
        const det = door.detail;
        if (det) {
          html += ` — <span class="door-detail">${det.material}`;
          if (det.materialNotes) html += ` (${det.materialNotes})`;
          html += `; ${det.mechanism}`;
          if (det.mechanismNotes) html += ` (${det.mechanismNotes})`;
          if (det.specialType) html += `; Special: ${det.specialType.name} — ${det.specialType.effect}`;
          if (det.lock) html += `; Lock: ${det.lock.name} DC ${det.lock.dc} — ${det.lock.notes}`;
          if (det.trapped && det.trapInfo) html += `; TRAP: ${det.trapInfo.name} DC ${det.trapInfo.dc} — ${det.trapInfo.effect}`;
          html += '</span>';
        }
      }
      html += '</li>';
    }
    html += '</ul></div>';
  }
  html += '</body></html>';

  const w = window.open('','_blank');
  if (!w) return alert('Pop-up blocked. Please allow pop-ups for this page.');
  w.document.write(html);
  w.document.close();
  w.focus();
  setTimeout(() => w.print(), 600);
});

// ── TXT Export ──────────────────────────────────────────
document.getElementById('btn-txt').addEventListener('click', () => {
  if (!_dungeon) return alert('Generate a dungeon first.');
  let txt = `DUNGEON KEY\nSeed: ${_dungeon.rng.seed}\nRooms: ${_dungeon.rooms.length}\n\n`;
  for (const room of _dungeon.rooms) {
    const c = room.content || {};
    const w = room.c2-room.c1+1, h2 = room.r2-room.r1+1;
    txt += `ROOM ${room.id}\n  Size: ${w}×${h2} (${w*5}×${h2*5} ft)\n  Type: ${c.type||'empty'}\n  ${c.description||''}\n`;
    if (c.enc) txt += `  Encounter Difficulty: ${c.enc.rating} (adj. ${c.enc.adjXP} XP)\n`;
    for (const f of (c.features||[])) txt += `  - ${f}\n`;
    if (room.doors?.length) {
      for (const door of room.doors) {
        const label = door.type&SECRET?'Secret':door.type&PORTC?'Portcullis':door.type&LOCKED?'Locked':door.type&DOOR?'Door':'Open Arch';
        txt += `  [${label}]`;
        const det = door.detail;
        if (det) { txt += ` ${det.material}; ${det.mechanism}`; if (det.lock) txt += `; Lock DC ${det.lock.dc}`; if (det.trapped&&det.trapInfo) txt += `; TRAP: ${det.trapInfo.name}`; }
        txt += '\n';
      }
    }
    txt += '\n';
  }
  txt += '\nWANDERING MONSTERS (d20)\n';
  for (const row of (_content?.wandering||[])) txt += `  ${row.roll}: ${row.encounter}\n`;
  const blob = new Blob([txt],{type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `dungeon_${_dungeon.rng.seed}.txt`; a.click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      alert(`Loaded dungeon (seed: ${data.seed}, ${data.rooms?.length} rooms). Set the seed field to reproduce.`);
      if (data.cfg) { document.getElementById('seed').value = data.seed; }
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Async JSON loader ───────────────────────────────────
async function loadExternalData() {
  const base = 'dungeon_gen/';
  const files = ['monsters','traps','treasures','special_rooms','room_features','doors'];
  try {
    const results = await Promise.all(files.map(f => fetch(base+f+'.json').then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })));
    const [monsters, traps, treasures, specialRooms, roomFeatures, doors] = results;
    DATA.monsters     = monsters.monsters || INLINE_MONSTERS;
    DATA.traps        = traps.traps       || INLINE_TRAPS;
    DATA.treasures    = treasures.tiers   || INLINE_TREASURES;
    DATA.specialRooms = specialRooms      || INLINE_SPECIAL_ROOMS;
    DATA.roomFeatures = roomFeatures      || INLINE_ROOM_FEATURES;
    DATA.doors        = doors             || INLINE_DOORS;
    // Ensure CR_XP fallback
    const CR_XP = {'0':10,'1/8':25,'1/4':50,'1/2':100,'1':200,'2':450,'3':700,'4':1100,'5':1800,'6':2300,'7':2900,'8':3900,'9':5000,'10':5900,'11':7200,'12':8400,'13':10000,'14':11500,'15':13000,'16':15000,'17':18000,'18':20000,'19':22000,'20':25000,'21':33000,'22':41000,'23':50000,'24':62000,'25':75000,'26':90000};
    for (const m of DATA.monsters) if (!m.xp || m.xp === 0) m.xp = CR_XP[m.cr] || 50;
    // fill missing motifs for specialRooms & roomFeatures
    ['elemental_fire','elemental_cold','fey','infernal','aquatic','giant','construct','aberrant'].forEach(mot => {
      if (!DATA.specialRooms[mot]) DATA.specialRooms[mot] = DATA.specialRooms.standard;
      if (!DATA.roomFeatures[mot]) DATA.roomFeatures[mot] = DATA.roomFeatures.standard;
    });
  } catch(e) {
    console.info('External JSON not loaded (using inline data):', e.message);
  }
}

const SETTINGS_IDS = [
  'dungeon-size', 'tile-size', 'layout', 'dungeon-shape',
  'room-size', 'room-count', 'room-layout', 'corridor-style',
  'remove-deadends', 'door-density', 'room-exits', 'egress',
  'dungeon-level', 'party-size', 'difficulty', 'motif',
  'special-rooms', 'wall-style', 'color-scheme', 'grid-style',
  'img-format', 'ui-theme', 'zoom',
];

function saveSettings() {
  const settings = {};
  for (const id of SETTINGS_IDS) {
    const el = document.getElementById(id);
    if (el) settings[id] = el.value;
  }
  try { localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings)); } catch(e) {}
}

function loadSettings() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY) || 'null'); } catch(e) {}
  if (!saved) return;
  for (const id of SETTINGS_IDS) {
    const el = document.getElementById(id);
    if (el && saved[id] !== undefined) el.value = saved[id];
  }
  const theme = document.getElementById('ui-theme')?.value;
  if (theme) applyUITheme(theme);
  const zoom = document.getElementById('zoom')?.value;
  if (zoom) applyZoom(parseInt(zoom));
}

function attachSettingsListeners() {
  for (const id of SETTINGS_IDS) {
    const el = document.getElementById(id);
    if (!el) continue;
    const evt = (el.tagName === 'SELECT' || el.tagName === 'INPUT' && el.type === 'checkbox') ? 'change' : 'input';
    el.addEventListener(evt, saveSettings);
  }
}

// ── Init ─────────────────────────────────────────────────
const CR_XP_INLINE = {'0':10,'1/8':25,'1/4':50,'1/2':100,'1':200,'2':450,'3':700,'4':1100,'5':1800,'6':2300,'7':2900,'8':3900,'9':5000,'10':5900,'11':7200,'12':8400,'13':10000,'14':11500,'15':13000,'16':15000,'17':18000,'18':20000,'19':22000,'20':25000,'21':33000,'24':62000,'26':90000};
for (const m of INLINE_MONSTERS) if (!m.xp || m.xp === 0) m.xp = CR_XP_INLINE[m.cr] || 50;

window.addEventListener('load', async () => {
  await loadExternalData();
  loadSettings();
  attachSettingsListeners();
  generateDungeon();
});
</script>
