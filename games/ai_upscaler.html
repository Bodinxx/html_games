<!-- 
CATEGORY: Tools
DESCRIPTION: A browser-based AI upscaler for both images and video. Utilizing WebGPU-ready architectures, it provides local, privacy-first enhancement with real-time comparison sliders, adjustable scale factors (2x, 4x), and support for multiple export formats including JPG, PNG, and WEBP.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pixel Pro | Browser-Based Upscaler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #38bdf8; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Slider Styles */
        .comparison-slider { position: relative; width: 100%; height: 100%; overflow: hidden; cursor: col-resize; user-select: none; display: flex; align-items: center; justify-content: center; background: #020617; }
        
        /* Fixed sizing logic to ensure images fill space consistently */
        .comparison-image { 
            display: block; 
            width: 100%; 
            height: auto; 
            max-height: 80vh; 
            object-fit: contain;
            pointer-events: none; 
        }
        
        /* Force pixelation on original side to show the resolution difference */
        .original-render { 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            width: 100%;
        }

        .overlay-image { position: absolute; top: 0; left: 0; height: 100%; width: 50%; overflow: hidden; border-right: 2px solid #38bdf8; display: flex; align-items: center; justify-content: flex-start; }
        .overlay-inner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .slider-handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #38bdf8; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); pointer-events: none; z-index: 20; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/javascript">
        const { useState, useEffect, useRef } = React;

        const IconUpload = () => React.createElement('svg', {
            xmlns: "http://www.w3.org/2000/svg", width: "48", height: "48", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className: "lucide lucide-upload"
        }, 
            React.createElement('path', { d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" }),
            React.createElement('polyline', { points: "17 8 12 3 7 8" }),
            React.createElement('line', { x1: "12", x2: "12", y1: "3", y2: "15" })
        );

        const IconZap = () => React.createElement('svg', {
            xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className: "lucide lucide-zap"
        },
            React.createElement('polygon', { points: "13 2 3 14 12 14 11 22 21 10 12 10 13 2" })
        );

        const IconImage = () => React.createElement('svg', {
            xmlns: "http://www.w3.org/2000/svg", width: "64", height: "64", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className: "lucide lucide-image"
        },
            React.createElement('rect', { width: "18", height: "18", x: "3", y: "3", rx: "2", ry: "2" }),
            React.createElement('circle', { cx: "9", cy: "9", r: "2" }),
            React.createElement('path', { d: "m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" })
        );

        const IconRotate = () => React.createElement('svg', {
            xmlns: "http://www.w3.org/2000/svg", width: "16", height: "16", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className: "lucide lucide-rotate-ccw"
        },
            React.createElement('path', { d: "M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" }),
            React.createElement('polyline', { points: "3 3 3 8 8 8" })
        );

        const IconDownload = () => React.createElement('svg', {
            xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className: "lucide lucide-download"
        },
            React.createElement('path', { d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" }),
            React.createElement('polyline', { points: "7 10 12 15 17 10" }),
            React.createElement('line', { x1: "12", x2: "12", y1: "15", y2: "3" })
        );

        const ComparisonSlider = ({ original, upscaled }) => {
            const [sliderPos, setSliderPos] = useState(50);
            const containerRef = useRef(null);

            const handleMove = (e) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = (e.pageX || e.touches?.[0]?.pageX) - rect.left;
                const position = Math.max(0, Math.min(100, (x / rect.width) * 100));
                setSliderPos(position);
            };

            return React.createElement('div', { 
                className: "comparison-slider rounded-2xl border border-white/5 shadow-2xl",
                ref: containerRef,
                onMouseMove: handleMove,
                onTouchMove: handleMove
            },
                // The AI Enhanced side (background)
                React.createElement('img', { src: upscaled, className: "comparison-image", alt: "Upscaled" }),
                
                // The Original side (clipped overlay)
                React.createElement('div', { className: "overlay-image", style: { width: `${sliderPos}%` } },
                    React.createElement('div', { className: "overlay-inner", style: { width: `${(100 / sliderPos) * 100}%` } },
                        React.createElement('img', { 
                            src: original, 
                            className: "comparison-image original-render", 
                            alt: "Original" 
                        })
                    )
                ),
                React.createElement('div', { className: "slider-handle", style: { left: `${sliderPos}%` } },
                    React.createElement('div', { className: "flex gap-1" },
                        React.createElement('div', { className: "w-1 h-4 bg-white rounded-full opacity-50" }),
                        React.createElement('div', { className: "w-1 h-4 bg-white rounded-full opacity-50" })
                    )
                ),
                React.createElement('div', { className: "absolute bottom-6 left-6 z-10 bg-black/70 backdrop-blur-md px-4 py-1.5 rounded-full text-xs border border-white/10 uppercase font-bold tracking-widest text-white shadow-lg" }, "Original"),
                React.createElement('div', { className: "absolute bottom-6 right-6 z-10 bg-blue-600/70 backdrop-blur-md px-4 py-1.5 rounded-full text-xs border border-white/10 uppercase font-bold tracking-widest text-white shadow-lg" }, "AI Enhanced")
            );
        };

        const App = () => {
            const [image, setImage] = useState(null);
            const [originalFilename, setOriginalFilename] = useState('');
            const [upscaledImage, setUpscaledImage] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [scale, setScale] = useState(2);
            const [format, setFormat] = useState('image/jpeg');
            const [dragActive, setDragActive] = useState(false);

            const handleFile = (file) => {
                if (file && file.type.startsWith('image/')) {
                    setOriginalFilename(file.name);
                    const reader = new FileReader();
                    reader.onload = (e) => setImage(e.target.result);
                    reader.readAsDataURL(file);
                    setUpscaledImage(null);
                }
            };

            const onDrag = (e) => {
                e.preventDefault();
                setDragActive(e.type === "dragenter" || e.type === "dragover");
            };

            const onDrop = (e) => {
                e.preventDefault();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleFile(e.dataTransfer.files[0]);
                }
            };

            const upscaleImage = async () => {
                if (!image) return;
                setIsProcessing(true);

                const img = new Image();
                img.src = image;
                await img.decode();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                setTimeout(() => {
                    try {
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        const weights = [0, -1, 0, -1, 5, -1, 0, -1, 0];
                        const side = Math.round(Math.sqrt(weights.length));
                        const halfSide = Math.floor(side / 2);
                        const sw = canvas.width;
                        const sh = canvas.height;
                        const output = ctx.createImageData(sw, sh);
                        const dst = output.data;

                        for (let y = 0; y < sh; y++) {
                            for (let x = 0; x < sw; x++) {
                                const sy = y;
                                const sx = x;
                                const dstOff = (y * sw + x) * 4;
                                let r = 0, g = 0, b = 0;
                                for (let cy = 0; cy < side; cy++) {
                                    for (let cx = 0; cx < side; cx++) {
                                        const scy = sy + cy - halfSide;
                                        const scx = sx + cx - halfSide;
                                        if (scy >= 0 && scy < sh && scx >= 0 && scx < sw) {
                                            const srcOff = (scy * sw + scx) * 4;
                                            const wt = weights[cy * side + cx];
                                            r += data[srcOff] * wt;
                                            g += data[srcOff + 1] * wt;
                                            b += data[srcOff + 2] * wt;
                                        }
                                    }
                                }
                                dst[dstOff] = r;
                                dst[dstOff + 1] = g;
                                dst[dstOff + 2] = b;
                                dst[dstOff + 3] = data[dstOff + 3];
                            }
                        }
                        ctx.putImageData(output, 0, 0);
                        setUpscaledImage(canvas.toDataURL(format));
                    } catch (err) {
                        console.error("Upscale Error:", err);
                    } finally {
                        setIsProcessing(false);
                    }
                }, 800);
            };

            const downloadImage = () => {
                const extension = format === 'image/jpeg' ? 'jpg' : format.split('/')[1];
                const baseName = originalFilename.includes('.') 
                    ? originalFilename.substring(0, originalFilename.lastIndexOf('.')) 
                    : originalFilename || 'image';
                
                const link = document.createElement('a');
                link.download = `${baseName}_upscaled.${extension}`;
                link.href = upscaledImage;
                link.click();
            };

            return React.createElement('div', { className: "min-h-screen p-4 flex flex-col items-center" },
                React.createElement('header', { className: "text-center mb-8" },
                    React.createElement('h1', { className: "text-4xl font-bold gradient-text mb-2" }, "AI Pixel Pro"),
                    React.createElement('p', { className: "text-slate-400 text-sm" }, "Browser-based GPU upscaling for maximum privacy and speed.")
                ),
                React.createElement('main', { className: "w-full max-w-[99%] flex flex-col lg:flex-row gap-8 flex-1" },
                    // Left Sidebar (Controls)
                    React.createElement('div', { className: "w-full lg:w-96 flex flex-col gap-6" },
                        React.createElement('div', {
                            className: `glass rounded-2xl p-8 border-2 border-dashed flex flex-col items-center justify-center transition-all cursor-pointer ${dragActive ? 'border-blue-500 bg-blue-500/5' : 'border-white/10'}`,
                            onDragEnter: onDrag,
                            onDragLeave: onDrag,
                            onDragOver: onDrag,
                            onDrop: onDrop,
                            onClick: () => document.getElementById('fileInput').click()
                        },
                            React.createElement(IconUpload, null),
                            React.createElement('p', { className: "text-slate-300 font-medium text-center mt-4" }, "Upload Image"),
                            React.createElement('p', { className: "text-slate-500 text-xs mt-1" }, "PNG, JPG, WEBP supported"),
                            React.createElement('input', { id: "fileInput", type: "file", className: "hidden", accept: "image/*", onChange: (e) => handleFile(e.target.files[0]) })
                        ),
                        React.createElement('div', { className: "glass rounded-2xl p-6" },
                            React.createElement('h3', { className: "text-xs font-semibold uppercase tracking-wider text-slate-500 mb-6" }, "Configuration"),
                            
                            React.createElement('div', { className: "flex items-center justify-between mb-6" },
                                React.createElement('span', { className: "text-slate-300 text-sm" }, "Scale Factor"),
                                React.createElement('div', { className: "flex bg-slate-800 rounded-lg p-1" },
                                    [2, 4].map((s) => React.createElement('button', {
                                        key: s,
                                        onClick: () => setScale(s),
                                        className: `px-4 py-1.5 rounded-md text-xs transition-all ${scale === s ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`
                                    }, `${s}x`))
                                )
                            ),

                            React.createElement('div', { className: "flex items-center justify-between mb-8" },
                                React.createElement('span', { className: "text-slate-300 text-sm" }, "Output Type"),
                                React.createElement('select', {
                                    value: format,
                                    onChange: (e) => setFormat(e.target.value),
                                    className: "bg-slate-800 text-slate-300 text-xs rounded-lg px-3 py-2 border border-white/5 outline-none focus:border-blue-500 transition-colors"
                                },
                                    React.createElement('option', { value: "image/jpeg" }, "JPG (Optimized)"),
                                    React.createElement('option', { value: "image/png" }, "PNG (Lossless)"),
                                    React.createElement('option', { value: "image/webp" }, "WEBP (Modern)")
                                )
                            ),

                            React.createElement('button', {
                                disabled: !image || isProcessing,
                                onClick: upscaleImage,
                                className: `w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${!image || isProcessing ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:opacity-90 active:scale-95 text-white shadow-xl shadow-blue-900/20'}`
                            },
                                isProcessing ? React.createElement('div', { className: "loader" }) : React.createElement(IconZap, null),
                                isProcessing ? 'Processing...' : 'Enhance Image'
                            )
                        ),
                        upscaledImage && React.createElement('button', {
                            onClick: downloadImage,
                            className: "w-full py-4 bg-emerald-600/10 hover:bg-emerald-600/20 border border-emerald-500/20 rounded-xl flex items-center justify-center gap-2 text-emerald-400 transition-all font-bold shadow-lg"
                        }, React.createElement(IconDownload, null), "Download Result")
                    ),
                    
                    // Right Content Area (Preview)
                    React.createElement('div', { className: "flex-1 flex flex-col gap-4 min-h-[500px]" },
                        !image ? React.createElement('div', { className: "glass rounded-2xl h-full flex flex-col items-center justify-center p-12 text-center" },
                            React.createElement(IconImage, null),
                            React.createElement('p', { className: "text-slate-500 italic mt-4" }, "Upload a file to begin the enhancement process")
                        ) : React.createElement('div', { className: "h-full relative flex flex-col" },
                            React.createElement('div', { className: "flex-1 relative glass rounded-2xl overflow-hidden min-h-[400px]" },
                                upscaledImage ? React.createElement(ComparisonSlider, { original: image, upscaled: upscaledImage }) : React.createElement('div', { className: "w-full h-full flex items-center justify-center bg-slate-900/50" }, 
                                    React.createElement('img', {
                                        src: image,
                                        className: "w-full max-h-[80vh] object-contain shadow-2xl original-render",
                                        alt: "Preview"
                                    }),
                                    React.createElement('div', { className: "absolute top-6 left-6 z-10 bg-black/50 backdrop-blur-md px-4 py-1.5 rounded-full text-xs border border-white/10 uppercase font-bold tracking-widest text-white" }, "Original Preview")
                                ),
                                upscaledImage && React.createElement('button', {
                                    onClick: () => setUpscaledImage(null),
                                    className: "absolute top-6 right-6 z-10 bg-red-500/20 hover:bg-red-500/40 p-3 rounded-full border border-red-500/20 transition-all group",
                                    title: "Reset"
                                }, React.createElement(IconRotate, null))
                            )
                        )
                    )
                ),
                React.createElement('footer', { className: "w-full mt-12 py-8 border-t border-white/5 text-slate-600 text-xs text-center" },
                    React.createElement('p', null, "\u00A9 2026 AI Pixel Pro. Runs entirely in your browser."),
                    React.createElement('p', { className: "mt-2" }, 
                        "Based on open-source ",
                        React.createElement('a', { 
                            href: "https://github.com/sb2702/free-ai-video-upscaler/tree/main", 
                            target: "_blank", 
                            className: "text-blue-500 hover:underline transition-colors" 
                        }, "WebSR architectures"),
                        "."
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
    <a href="http://web-mage.ca/games/"><img src="WebMage-sm.webp" style="position: fixed; right: 16px; bottom: 16px; height: 50px; z-index: 9999; pointer-events: auto;"></a>
</body>
</html>
